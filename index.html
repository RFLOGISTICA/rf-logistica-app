/* ===================== SALDO DE MOTORISTAS (v64) =====================
   Cada veículo tem um "regime" de motorista: "viagem" (paga por viagem,
   vira despesa em Despesas de Viagem) ou "clt" (salário fixo, tratado em
   Dívidas Fixas — não entra no cálculo por viagem). Para os "por viagem",
   mantemos um extrato: quanto foi gerado (Pag. Mot. das viagens) x quanto
   já foi pago (adiantamentos/vales/pagamentos registrados), com saldo
   sempre disponível, independente do mês ativo. */
function garantirMotoristas() {
  state.veiculos.forEach((v) => { if (!v.regimeMotorista) v.regimeMotorista = "viagem"; });
  if (!Array.isArray(state.pagamentosMotorista)) state.pagamentosMotorista = [];
}
function regimeMotoristaDaPlaca(placa) {
  const vc = state.veiculos.find((x) => x.placa === placa);
  return (vc && vc.regimeMotorista) || "viagem";
}
function nomesMotoristasPorViagem() {
  garantirMotoristas();
  const nomes = state.veiculos.filter((v) => v.motorista && v.regimeMotorista !== "clt").map((v) => v.motorista);
  return [...new Set(nomes)].sort();
}
function saldoMotorista(nome) {
  garantirMotoristas();
  const gerado = state.viagens.reduce((s, v) => {
    const vc = state.veiculos.find((x) => x.placa === v.placa);
    if (!vc || vc.motorista !== nome || vc.regimeMotorista === "clt") return s;
    return s + (Number(v.vgPagMotorista) || 0);
  }, 0);
  const pago = state.pagamentosMotorista.filter((p) => p.motorista === nome).reduce((s, p) => s + (Number(p.valor) || 0), 0);
  return { gerado, pago, saldo: gerado - pago };
}
function registrarPagamentoMotorista(nome) {
  const valorTxt = prompt("Valor pago/adiantado para " + nome + " (R$):", "");
  if (valorTxt === null) return;
  const valor = Number(String(valorTxt).replace(",", "."));
  if (!valor || valor <= 0) { alert("Valor inválido."); return; }
  const obs = prompt("Observação (opcional, ex: vale, pagamento fim de mês):", "") || "";
  garantirMotoristas();
  state.pagamentosMotorista.push({ id: uid(), motorista: nome, data: hojeISO(), valor: valor, obs: obs });
  salvar(); render();
}
function removerPagamentoMotorista(id) {
  if (!confirm("Remover este registro de pagamento?")) return;
  state.pagamentosMotorista = state.pagamentosMotorista.filter((p) => p.id !== id);
  salvar(); render();
}

/* ===================== ABASTECIMENTO PELO MOTORISTA (v92) =====================
   Vive numa tabela própria no Supabase (abastecimentos_motorista), FORA da
   caixa geral (painel_dados). O banco (RLS) garante sozinho que motorista só
   vê/edita as próprias linhas, e que a equipe vê todas. Isso funciona mesmo
   que alguém tente ler os dados direto pelo navegador (F12) — a trava é no
   servidor, não só na tela. */
var RF_ABAST_TABELA = "abastecimentos_motorista";

function rfAbastParaJS(r) {
  return {
    id: r.id,
    motoristaUid: r.motorista_uid,
    motoristaNome: r.motorista_nome || "",
    placa: r.placa || "",
    data: r.data || "",
    kmAtual: Number(r.km_atual) || 0,
    litros: Number(r.litros) || 0,
    valor: Number(r.valor) || 0,
    fotoKm: r.foto_km || "",
    fotoBomba: r.foto_bomba || "",
    fotoNota: r.foto_nota || "",
    obs: r.obs || "",
    status: r.status || "pendente",
    motivoRejeicao: r.motivo_rejeicao || "",
    viagemId: r.viagem_id || "",
    criadoEm: Number(r.criado_em) || 0,
  };
}
function rfAbastParaDB(a) {
  return {
    id: a.id,
    motorista_uid: a.motoristaUid,
    motorista_nome: a.motoristaNome || "",
    placa: a.placa || "",
    data: a.data || null,
    km_atual: Number(a.kmAtual) || 0,
    litros: Number(a.litros) || 0,
    valor: Number(a.valor) || 0,
    foto_km: a.fotoKm || "",
    foto_bomba: a.fotoBomba || "",
    foto_nota: a.fotoNota || "",
    obs: a.obs || "",
    status: a.status || "pendente",
    motivo_rejeicao: a.motivoRejeicao || "",
    viagem_id: a.viagemId || "",
    criado_em: a.criadoEm || Date.now(),
  };
}
// Carrega os abastecimentos do banco. Para motorista, o RLS já entrega só os
// dele; para equipe, entrega todos. Não depende do sync da caixa geral.
function rfAbastCarregar() {
  rfGetClient().then(function (sb) {
    if (!sb || !sessaoValida()) return;
    sb.from(RF_ABAST_TABELA).select("*").then(function (res) {
      if (res.error) { console.warn("abastecimentos_motorista:", res.error.message); return; }
      state.abastecimentos = (res.data || []).map(rfAbastParaJS)
        .sort(function (x, y) { return (y.criadoEm || 0) - (x.criadoEm || 0); });
      render();
    });
  });
}
function rfAbastAssinarTempoReal() {
  rfGetClient().then(function (sb) {
    if (!sb || window.__rfAbastCanal) return;

// v111: edições de CAMPO (valor, litros, km, placa, obs, fotos, OCR) nunca devem
// sobrescrever o status já decidido pela equipe. Antes, qualquer edição reenviava
// a LINHA INTEIRA (upsert) -- se o celular do motorista ainda não tinha recebido
// a aprovação da equipe (real-time atrasado/offline), o status local desatualizado
// ("pendente") ia junto no upsert e reabria um abastecimento já aprovado, sem
// ninguém perceber. Agora é um UPDATE parcial, que nunca toca no campo status, e
// só é aplicado se o registro ainda estiver "pendente" no banco -- se a equipe já
// decidiu nesse meio tempo, a edição é descartada e a tela recarrega os dados reais.
function rfAbastSalvarCampoMotorista(a) {
  rfGetClient().then(function (sb) {
    if (!sb) { alert("Sem conexão com a nuvem. Verifique a internet e tente de novo."); return; }
    var payload = rfAbastParaDB(a);
    delete payload.status;
    delete payload.motivo_rejeicao;
    delete payload.viagem_id;
    sb.from(RF_ABAST_TABELA).update(payload).eq("id", a.id).eq("status", "pendente").select().then(function (res) {
      if (res.error) { alert("Não consegui salvar o abastecimento na nuvem: " + res.error.message); return; }
      if (!res.data || res.data.length === 0) {
        alert("Esse abastecimento já foi revisado pela equipe enquanto você editava — sua alteração não foi salva. Atualizando a lista com os dados mais recentes.");
        rfAbastCarregar();
      }
    });
  });
}
function rfAbastDeletarLinha(id) {
  rfGetClient().then(function (sb) {

    sb.from(RF_ABAST_TABELA).delete().eq("id", id).select().then(function (res) {
      if (res.error) { alert("Não consegui excluir na nuvem: " + res.error.message); rfAbastCarregar(); return; }
      if (!res.data || res.data.length === 0) {
        alert("A exclusão não foi aplicada no banco (provavelmente por permissão/RLS). Restaurando a lista.");
        rfAbastCarregar();
      }
    });
  });
}

function rfViagemFimParaDB(a) {

function viagensFimDoMotorista() {

function adicionarViagemFim() {
  if (!Array.isArray(state.viagensFinalizadas)) state.viagensFinalizadas = [];
  // v106: o celular do motorista NÃO consegue escrever direto na caixa geral
  // (bloqueio de segurança) — então a viagem é criada do lado do servidor,
  // por uma função (RPC) que só deixa o motorista criar a PRÓPRIA viagem.
  rfGetClient().then(function (sb) {
    if (!sb) { alert("Sem conexão com a nuvem. Tente novamente com internet."); return; }
    sb.rpc("motorista_criar_viagem_inicio", { p_data: hojeISO() }).then(function (res) {
      if (res.error) { alert("Não consegui iniciar a viagem: " + res.error.message); return; }
      const viagemId = res.data;
      const nova = {
        id: uid(),
        motoristaUid: state.sessao ? state.sessao.uid : "",
        motoristaNome: state.sessao ? (state.sessao.nome || state.sessao.email || "") : "",
        placa: (state.sessao && state.sessao.placa_motorista) || "",
        data: hojeISO(), cliente: "", obs: "",
        status: "em_andamento", motivoRejeicao: "",
        viagemId: viagemId,
        criadoEm: Date.now(),

      state.viagensFinalizadas.unshift(nova);

// v104: fecha o ciclo — só passa para "pendente" (aguardando a equipe conferir)

function concluirViagemFim(id) {
  const a = (state.viagensFinalizadas || []).find((x) => String(x.id) === String(id));
  if (!a) return;
  if (!a.fotoKmFim) { alert("Anexe a foto do KM final antes de concluir a viagem. Isso é obrigatório."); return; }
  rfGetClient().then(function (sb) {
    if (!sb) { alert("Sem conexão com a nuvem."); return; }

      ? sb.rpc("motorista_concluir_viagem", { p_viagem_id: a.viagemId })
      : Promise.resolve({ error: null });
    chamada.then(function (res) {

      a.status = "pendente";
      render();

function atualizarViagemFim(id, campo, valor) {
  const a = (state.viagensFinalizadas || []).find((x) => String(x.id) === String(id));
  if (!a) return;
  a[campo] = valor;
  render();
  rfViagemFimSalvarLinha(a);
  // v106: mantém a viagem de verdade em sincronia — via RPC, porque o
  // motorista não escreve direto na caixa geral.
  if (a.viagemId && (campo === "data" || campo === "cliente" || campo === "obs") && a.status === "em_andamento") {
    rfGetClient().then(function (sb) {
      if (!sb) return;
      sb.rpc("motorista_atualizar_viagem_andamento", {
        p_viagem_id: a.viagemId, p_data: a.data || hojeISO(), p_cliente: a.cliente || "", p_obs: a.obs || "",
      });

}
function removerViagemFim(id) {

  const a = (state.viagensFinalizadas || []).find((x) => String(x.id) === String(id));
  if (a && a.viagemId && a.status === "em_andamento") {
    rfGetClient().then(function (sb) {
      if (sb) sb.rpc("motorista_cancelar_viagem", { p_viagem_id: a.viagemId });
    });
  } else if (a && a.viagemId) {
    // caso um admin exclua algo já processado, remove direto (admin tem acesso normal)
    state.viagens = state.viagens.filter((x) => String(x.id) !== String(a.viagemId));
    salvar();
  }
  state.viagensFinalizadas = (state.viagensFinalizadas || []).filter((x) => String(x.id) !== String(id));
  render();
  rfViagemFimDeletarLinha(id);

function aprovarViagemFim(id) {

  if (!a) return;

  if (!v) {
    // fallback: avisos antigos (de antes da v105) que não tinham viagem vinculada desde o início
    v = {
      id: uid(), placa: a.placa || "", cliente: a.cliente || "", data: a.data || hojeISO(), criadoEm: Date.now(),
      valorViagem: 0, km: 0, dias: 1,
      kmSaida: 0, kmChegada: 0, fotoKmSaida: "", fotoKmChegada: "",
      combustivelItens: [], vgPagMotorista: 500, vgPagAjudante: 300,
      temAjudante: true, pago: false, dataPagamento: "", pagoMotorista: false, dataPagamentoMotorista: "",
      outrosItens: [], obs: a.obs || "", origemMotorista: true, origemMotoristaNome: a.motoristaNome || "",
    };
    state.viagens.push(v);
    a.viagemId = v.id;

  v.statusMotorista = "aprovada";

  if (!a) return;

// v99: o celular do motorista NUNCA baixa a caixa geral (painel_dados) por
// segurança — então o resumo de viagens dele não pode ser calculado no
// cliente (não tem os dados). Em vez disso chamamos uma função seguridade
// no banco (RPC, SECURITY DEFINER) que lê a caixa geral do lado do servidor
// e devolve só os NÚMEROS agregados da placa dele — nunca a lista de viagens
// inteira, nunca dados de outros motoristas/clientes/valores da empresa.
function motoristaResumoAtualizar() {
  if (!ehMotorista()) return;
  rfGetClient().then(function (sb) {
    if (!sb) return;
    sb.rpc("motorista_resumo_viagens", { p_mes: state.mesAtivo }).then(function (res) {
      if (res.error) { console.warn("motorista_resumo_viagens:", res.error.message); return; }
      const linha = Array.isArray(res.data) ? res.data[0] : res.data;
      state._resumoViagensMotorista = linha
        ? { total: Number(linha.total_viagens) || 0, pagas: Number(linha.pagas) || 0, km: Number(linha.km_rodados) || 0 }
        : { total: 0, pagas: 0, km: 0 };
      render();
    });
  });
}
function motoristaTrocarMes(mes) { state.mesAtivo = mes; motoristaResumoAtualizar(); render(); }
function motoristaNavegarMes(dir) {
  const p = (state.mesAtivo || new Date().toISOString().slice(0, 7)).split("-");
  const d = new Date(Number(p[0]), Number(p[1]) - 1 + dir, 1);
  state.mesAtivo = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
  motoristaResumoAtualizar();
  render();
}

function abastecimentosDoMotorista() {
  const uidLogado = state.sessao ? state.sessao.uid : null;
  return (state.abastecimentos || []).filter((a) => a.motoristaUid === uidLogado)
    .slice().sort((a, b) => (b.criadoEm || 0) - (a.criadoEm || 0));
}
function abastecimentosFiltrados() {
  const st = state.filtroStatusAbast || "pendente";
  const lista = (state.abastecimentos || []).slice().sort((a, b) => (b.criadoEm || 0) - (a.criadoEm || 0));
  if (st === "todos") return lista;
  return lista.filter((a) => a.status === st);
}
function adicionarAbastecimento() {
  if (!Array.isArray(state.abastecimentos)) state.abastecimentos = [];
  // v109: se o motorista tem uma viagem "em andamento" agora, o abastecimento
  // já nasce vinculado a ela sozinho (placa + viagemId) — ele pode trocar
  // depois se precisar, e a equipe também pode mudar na hora de aprovar.
  const viagemAtiva = (state._minhasViagensAtivas || []).find((v) => v.status === "em_andamento");
  const nova = {
    id: uid(),
    motoristaUid: state.sessao ? state.sessao.uid : "",
    motoristaNome: state.sessao ? (state.sessao.nome || state.sessao.email || "") : "",
    placa: viagemAtiva ? (viagemAtiva.placa || "") : "", data: hojeISO(), kmAtual: "", litros: "", valor: "",
    fotoKm: "", fotoBomba: "", fotoNota: "", obs: "",
    status: "pendente", motivoRejeicao: "", viagemId: viagemAtiva ? viagemAtiva.id : "",
    criadoEm: Date.now(),
  };
  state.abastecimentos.unshift(nova);
  render();
  rfAbastSalvarLinha(nova);
}
function atualizarAbastecimento(id, campo, valor) {
  const a = (state.abastecimentos || []).find((x) => String(x.id) === String(id));
  if (!a) return;
  if (a.status !== "pendente") {
    alert("Esse abastecimento já foi revisado pela equipe e não pode mais ser editado.");
    rfAbastCarregar();
    return;
  }
  if (campo === "veiculoId") {
    const v = state.veiculos.find((x) => String(x.id) === String(valor));
    a.placa = v ? v.placa : "";
  } else if (campo === "kmAtual" || campo === "litros" || campo === "valor") {
    a[campo] = Number(String(valor).replace(",", ".")) || 0;
  } else {
    a[campo] = valor;
  }
  render();
  rfAbastSalvarCampoMotorista(a);
}
function removerAbastecimento(id) {
  if (!confirm("Remover este abastecimento?")) return;
  state.abastecimentos = (state.abastecimentos || []).filter((x) => String(x.id) !== String(id));
  render();
  rfAbastDeletarLinha(id);
}

// a equipe só completa cliente, valor da viagem e KM de saída.
function aprovarAbastecimentoNovaViagem(id) {
  const a = (state.abastecimentos || []).find((x) => String(x.id) === String(id));
  if (!a) return;
  if (!a.placa) { alert("Este abastecimento não tem um caminhão definido."); return; }
  if (!a.fotoBomba || !a.fotoNota) { alert("Faltam fotos obrigatórias: o visor da bomba e a nota/comprovante precisam estar anexados antes de aprovar."); return; }
  const novaViagem = {
    id: uid(), placa: a.placa, cliente: "", data: a.data || hojeISO(), criadoEm: Date.now(),
    valorViagem: 0, km: 0, dias: 1,
    kmSaida: 0, kmChegada: Number(a.kmAtual) || 0, fotoKmSaida: "", fotoKmChegada: "",
    combustivelItens: [{ id: uid(), valor: Number(a.valor) || 0, litros: Number(a.litros) || 0, desc: "Abastecimento lançado por " + (a.motoristaNome || "motorista") }],
    vgPagMotorista: 500, vgPagAjudante: 300, temAjudante: true, pago: false, dataPagamento: "", pagoMotorista: false, dataPagamentoMotorista: "",
    outrosItens: [], origemMotorista: true, origemMotoristaNome: a.motoristaNome || "",
  };
  state.viagens.push(novaViagem);
  a.status = "aprovado"; a.viagemId = novaViagem.id;
  state.filtroPlacaViagem = a.placa; state.filtroClienteViagem = "Todos"; state.aba = "viagem";
  salvar(); render();
  rfAbastSalvarLinha(a);

}
// Aprovar vinculando a uma viagem JÁ lançada (mesmo caminhão) — soma o combustível
// e atualiza o KM de chegada se o informado pelo motorista for maior.
function vincularAbastecimentoAViagem(id, viagemId) {
  const a = (state.abastecimentos || []).find((x) => String(x.id) === String(id));
  const v = state.viagens.find((x) => String(x.id) === String(viagemId));
  if (!a || !v) return;
  if (!a.fotoBomba || !a.fotoNota) { alert("Faltam fotos obrigatórias: o visor da bomba e a nota/comprovante precisam estar anexados antes de aprovar."); return; }
  if (!v.combustivelItens) v.combustivelItens = [];
  v.combustivelItens.push({ id: uid(), valor: Number(a.valor) || 0, litros: Number(a.litros) || 0, desc: "Abastecimento lançado por " + (a.motoristaNome || "motorista") });
  if ((Number(a.kmAtual) || 0) > (Number(v.kmChegada) || 0)) { v.kmChegada = Number(a.kmAtual) || 0; recalcularKmDaViagem(v); }
  // v113: NAO usar mais a foto do abastecimento como foto de chegada da viagem --
  // sao coisas diferentes e a foto de KM final da viagem e critica, nao pode
  // ficar confundida com o comprovante de abastecimento. A foto do abastecimento
  // continua visivel normalmente na propria aba Abastecimento (botao "ver foto").
  a.status = "aprovado"; a.viagemId = v.id;
  salvar(); render();
  rfAbastSalvarLinha(a);
}
function rejeitarAbastecimento(id) {
  const motivo = prompt("Motivo da rejeição (fica visível pro motorista) — opcional:", "") || "";
  const a = (state.abastecimentos || []).find((x) => String(x.id) === String(id));
  if (!a) return;
  a.status = "rejeitado"; a.motivoRejeicao = motivo;
  render();
  rfAbastSalvarLinha(a);
}
function reabrirAbastecimento(id) {
  const a = (state.abastecimentos || []).find((x) => String(x.id) === String(id));
  if (!a) return;
  a.status = "pendente"; a.motivoRejeicao = "";
  render();
  rfAbastSalvarLinha(a);
}
function exportarAbastecimentosExcel() {
  const cab = ["Data", "Motorista", "Placa", "KM", "Litros", "Valor", "Status", "Observação"];
  const linhas = abastecimentosFiltrados().map((a) => [a.data || "", a.motoristaNome || "", a.placa || "", a.kmAtual || 0, a.litros || 0, a.valor || 0, a.status || "", a.obs || ""]);
  exportarCSV("rf-abastecimentos-" + hojeISO() + ".csv", cab, linhas);
}

// v122: Assistente virtual — Fase 1 (painel interno).
// Monta um resumo textual dos dados atuais pra mandar junto da pergunta.

function gerarContextoAssistente() {
  const t = calcularTotais();
  const mesA = mesLabel(state.mesAtivo);
  const viagensMes = state.viagens.filter((v) => v.data && v.data.slice(0, 7) === state.mesAtivo);
  const porCliente = {};
  viagensMes.forEach((v) => {
    const c = v.cliente || "(sem cliente)";
    if (!porCliente[c]) porCliente[c] = { qtd: 0, valor: 0, pago: 0 };
    porCliente[c].qtd += 1;
    porCliente[c].valor += Number(v.valorViagem) || 0;
    if (v.pago) porCliente[c].pago += Number(v.valorViagem) || 0;
  });
  const linhasCliente = Object.keys(porCliente).map((c) => {
    const d = porCliente[c];
    return `- ${c}: ${d.qtd} viagem(ns), faturado ${fmtR(d.valor)}, pago ${fmtR(d.pago)}, pendente ${fmtR(d.valor - d.pago)}`;
  }).join("\n");
  const dividasVencendo = (state.dividas || []).filter((d) => { const dias = diasPara(d.vencimento); return dias !== null && dias <= 15; })
    .map((d) => `- ${d.nome || d.descricao || "dívida"}: ${fmtR(d.valorMes)} vence em ${d.vencimento}`).join("\n");
  const abastPendentes = (state.abastecimentos || []).filter((a) => a.status === "pendente").length;
  const seguroVencendo = veiculosComMes().filter((v) => { const dias = diasPara(v.venctoSeguro); return dias !== null && dias <= 30; })
    .map((v) => `- ${v.placa}: seguro vence em ${v.venctoSeguro}`).join("\n");

  // v127: histórico completo — todos os meses, não só o mês ativo.
  const porMes = {};
  state.viagens.forEach((v) => {
    if (!v.data) return;
    const m = v.data.slice(0, 7);
    if (!porMes[m]) porMes[m] = { qtd: 0, receita: 0, despesa: 0 };
    const c = calcularViagem(v);
    porMes[m].qtd += 1;
    porMes[m].receita += c.valorViagem;
    porMes[m].despesa += c.totalDesp;
  });
  const linhasMes = Object.keys(porMes).sort().map((m) => {
    const d = porMes[m];
    return `- ${mesLabel(m)}: ${d.qtd} viagem(ns), receita ${fmtR(d.receita)}, despesa ${fmtR(d.despesa)}, resultado ${fmtR(d.receita - d.despesa)}`;
  }).join("\n");

  const porClienteTudo = {};
  state.viagens.forEach((v) => {
    const c = v.cliente || "(sem cliente)";
    if (!porClienteTudo[c]) porClienteTudo[c] = { qtd: 0, valor: 0, pago: 0 };
    porClienteTudo[c].qtd += 1;
    porClienteTudo[c].valor += Number(v.valorViagem) || 0;
    if (v.pago) porClienteTudo[c].pago += Number(v.valorViagem) || 0;
  });
  const linhasClienteTudo = Object.keys(porClienteTudo).map((c) => {
    const d = porClienteTudo[c];
    return `- ${c}: ${d.qtd} viagem(ns) no total, faturado ${fmtR(d.valor)}, pago ${fmtR(d.pago)}, pendente ${fmtR(d.valor - d.pago)}`;
  }).join("\n");

  return `Mês ativo no painel: ${mesA}
Frota: ${t.totalVeiculos} veículos (${t.emViagem} em viagem, ${t.foraOperacao} fora de operação)
Ocupação da frota: ${t.ocupacaoPct.toFixed(1)}%
Margem da frota (manual): ${fmtR(t.margem)} (${t.margemPct.toFixed(1)}%)
Viagens do mês: ${t.viagensMes} — receita ${fmtR(t.viagensReceita)}, despesa ${fmtR(t.viagensDespesa)}, resultado ${fmtR(t.viagensSobra)}
Viagens acumulado (todos os meses): receita ${fmtR(t.viagensReceitaAcum)}, resultado ${fmtR(t.viagensSobraAcum)} (margem ${t.margemViagensAcumPct.toFixed(1)}%)
Dívidas fixas do mês: ${fmtR(t.totalDividasFixas)}
Manutenção real do mês: ${fmtR(t.manutencaoReal)}
Lucro real do mês: ${fmtR(t.lucroReal)}
Abastecimentos pendentes de aprovação: ${abastPendentes}

Viagens do mês ativo por cliente:
${linhasCliente || "(nenhuma viagem lançada no mês ativo)"}

Histórico mensal completo (todos os meses com viagem lançada):
${linhasMes || "(nenhum)"}

Total por cliente (histórico completo, todos os meses):
${linhasClienteTudo || "(nenhum)"}

Dívidas vencendo nos próximos 15 dias:
${dividasVencendo || "(nenhuma)"}

Seguros vencendo nos próximos 30 dias:
${seguroVencendo || "(nenhum)"}`;
}

function chatEnviarPergunta() {
  const input = document.getElementById("chatInput");
  if (!input) return;
  const pergunta = input.value.trim();
  if (!pergunta || state._chatCarregando) return;
  if (!state._chatMensagens) state._chatMensagens = [];
  state._chatMensagens.push({ role: "user", content: pergunta });
  state._chatCarregando = true;
  input.value = "";
  render();
  const historico = state._chatMensagens.slice(0, -1).map((m) => ({ role: m.role, content: m.content }));
  const contexto = gerarContextoAssistente();
  rfGetClient().then(function (sb) {
    if (!sb) { chatErro("Sem conexão com o servidor."); return; }
    sb.auth.getSession().then(function (res) {
      const token = res.data && res.data.session && res.data.session.access_token;
      if (!token) { chatErro("Sessão expirada. Saia e entre de novo."); return; }
      fetch(RF_SB_URL + "/functions/v1/assistente-chat", {
        method: "POST",
        headers: { "Authorization": "Bearer " + token, "apikey": RF_SB_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ pergunta: pergunta, contexto: contexto, historico: historico }),
      }).then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
        .then(function (res2) {
          state._chatCarregando = false;
          if (!res2.ok) { chatErro(res2.j.error || "Erro ao falar com o assistente."); return; }
          const resposta = res2.j.resposta || "(sem resposta)";
          state._chatMensagens.push({ role: "assistant", content: resposta });
          render();
          falarTexto(resposta, chatContinuarConversaSeAtivo);
        }).catch(function (e) { chatErro("Erro de conexão: " + e.message); });
    });
  });
}

// v124: falar com o assistente por voz — usa o reconhecimento de fala do
// próprio navegador (Web Speech API), de graça, sem passar pela API paga.
// Funciona no Chrome (Android/desktop); em navegadores sem suporte, avisa.
// v125: o assistente também FALA a resposta em voz alta (texto-pra-voz do
// próprio navegador, de graça, sem gastar crédito da OpenAI). Dá pra
// silenciar no botão 🔊 no cabeçalho do chat.
// v126: "modo conversa" — aperta o microfone UMA vez pra começar; depois
// disso ele escuta, responde e volta a escutar sozinho, sem precisar
// apertar de novo a cada pergunta. Só desliga se: (a) apertar o microfone
// de novo, (b) fechar o chat, ou (c) passar alguns minutos sem ninguém falar.
function falarTexto(texto, aoTerminar) {
  if (state._chatVozAtiva === false || !window.speechSynthesis || !texto) { if (aoTerminar) aoTerminar(); return; }
  try {
    window.speechSynthesis.cancel(); // corta qualquer fala anterior ainda em andamento
    const fala = new SpeechSynthesisUtterance(texto);
    fala.lang = "pt-BR";
    const vozes = window.speechSynthesis.getVoices();
    const vozPt = vozes.find((v) => v.lang === "pt-BR") || vozes.find((v) => v.lang && v.lang.indexOf("pt") === 0);
    if (vozPt) fala.voice = vozPt;
    if (aoTerminar) { fala.onend = aoTerminar; fala.onerror = aoTerminar; }
    window.speechSynthesis.speak(fala);
  } catch (e) { if (aoTerminar) aoTerminar(); }
}
function chatAlternarVozResposta() {
  state._chatVozAtiva = !state._chatVozAtiva;
  if (!state._chatVozAtiva && window.speechSynthesis) window.speechSynthesis.cancel();

}
var _rfReconhecimentoVoz = null;
var _rfConversaTimer = null;

function chatResetTimeoutConversa() {

function chatPararConversa() {

function chatContinuarConversaSeAtivo() {
  if (!state._chatModoConversa) return;
  chatResetTimeoutConversa();

function chatIniciarEscuta() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR || !state._chatModoConversa) return;
  let gotResult = false;

  _rfReconhecimentoVoz = rec;
  rec.lang = "pt-BR";
  rec.continuous = false;
  rec.interimResults = false;
  rec.onstart = function () { state._chatOuvindo = true; render(); };
  rec.onresult = function (ev) {
    gotResult = true;
    const texto = ev.results[0][0].transcript;
    const input = document.getElementById("chatInput");
    if (input) input.value = texto;
    state._chatOuvindo = false;
    chatResetTimeoutConversa();
    chatEnviarPergunta(); // lê o input e já renderiza — não chamar render() antes, senão apaga o texto
  };
  rec.onerror = function () { state._chatOuvindo = false; };
  rec.onend = function () {
    state._chatOuvindo = false;
    // se terminou sem resultado (silêncio nessa rodada) e o modo conversa
    // ainda tá ligado, volta a escutar sozinho — sem reiniciar se já
    // estamos esperando a resposta da IA (chatEnviarPergunta cuida disso).
    if (!gotResult && state._chatModoConversa && !state._chatCarregando) {
      setTimeout(function () { if (state._chatModoConversa) chatIniciarEscuta(); }, 600);
    }
    render();
  };

}
function chatAlternarVoz() {

  const compLabels = ["Combustível", "Manutenção", "Pneus", "ADM", "Imposto", "Alimentação", "Pagamento motorista/ajudante", "Outros"];
  const compValores = [t.combustivelTotal, t.manutTotal, t.pneusTotal, t.admTotal, t.impostoTotal, t.alimTotal, t.pagTotal, t.outrosTotal];
  if (elComp) {
    window.__rfCharts["graf-composicao"] = new Chart(elComp, {
      type: "doughnut",
      data: { labels: compLabels, datasets: [{ data: compValores.map((v) => Math.round(v * 100) / 100), backgroundColor: GRAF_PALETA, borderColor: "#0E0E0E", borderWidth: 2 }] },
      options: { ...graficoBase(), plugins: { ...graficoBase().plugins, legend: { position: "bottom", labels: { color: "#ccc", font: { size: 10 }, boxWidth: 12 } } } },
    });
    graficoLoadingSumir("graf-composicao");
  }

  // 3) Manutenção recorrente por caminhão (barra vertical, contagem de lançamentos)
  graficoDestruir("graf-manut-freq");
  const elManut = document.getElementById("graf-manut-freq");
  if (elManut && porManutDesc.length) {
    window.__rfCharts["graf-manut-freq"] = new Chart(elManut, {
      type: "bar",
      data: { labels: porManutDesc, datasets: [{ label: "Nº de manutenções", data: porManutDesc.map((p) => dados[p].qtdManut), backgroundColor: "#C0392B", borderRadius: 4 }] },
      options: { ...graficoBase(), plugins: { ...graficoBase().plugins, legend: { display: false } },
        scales: { x: { ticks: { color: "#ccc" }, grid: { display: false } }, y: { ticks: { color: "#999", stepSize: 1 }, grid: { color: "#222" } } } },
    });
    graficoLoadingSumir("graf-manut-freq");
  }

  // 4) Evolução mensal do custo total da frota (linha)
  graficoDestruir("graf-evolucao");
  const elEvol = document.getElementById("graf-evolucao");
  if (elEvol && evolucao.length) {
    window.__rfCharts["graf-evolucao"] = new Chart(elEvol, {
      type: "line",
      data: { labels: evolucao.map((m) => mesLabel(m.mes)), datasets: [
        { label: "Custo total", data: evolucao.map((m) => Math.round(m.custoTotal * 100) / 100), borderColor: "#C0392B", backgroundColor: "rgba(192,57,43,0.15)", tension: 0.25, fill: true },
        { label: "Receita", data: evolucao.map((m) => Math.round(m.receita * 100) / 100), borderColor: GOLD, backgroundColor: "rgba(212,160,23,0.10)", tension: 0.25, fill: true },
      ] },
      options: { ...graficoBase(), scales: { x: { ticks: { color: "#999" }, grid: { color: "#1a1a1a" } }, y: { ticks: { color: "#999" }, grid: { color: "#1a1a1a" } } } },
    });
    graficoLoadingSumir("graf-evolucao");
  }
}

  var podeSincronizar = false;

    "background:#161616;border:1px solid #2A2A2A;color:#999;";

  function iniciar() {

      // false). Agora que os dados reais já estão seguros no estado, reagenda
      // — assim a edição da pessoa não se perde, só espera o momento seguro.
      if (houveEdicaoLocal) agendarSubida();
    });
  }

  function agendarSubida() {
    if (!podeSincronizar) return; // v92: defesa extra — nunca agenda envio fora da equipe
    if (!dadosCarregados) { status("\u23F8 aguardando 1\u00ba download antes de salvar...", "#D4A017"); return; } // v118: nunca agenda envio antes do 1º download real
    clearTimeout(timerSubida);
    status("\u27F3 salvando...", "#D4A017");
    timerSubida = setTimeout(function () { subirTudo(false); }, 900);
  }

  function subirTudo(semear) {
    if (!podeSincronizar) return; // v92: defesa extra — nunca envia a caixa geral fora da equipe
    if (!dadosCarregados) return; // v118: defesa extra — nunca sobe estado antes do 1º download real confirmado
    if (!sb) { setTimeout(function () { subirTudo(semear); }, 500); return; }
    var agora = new Date().toISOString();
    var registros = [];
    CHAVES.forEach(function (c) {
      var txt = JSON.stringify(state[c]);
      if (semear || txt !== ultimoEnviado[c]) {
        ultimoEnviado[c] = txt;
        registros.push({ chave: c, valor: state[c], atualizado_em: agora });
      }
    });
    if (registros.length === 0) { status("\u2601 sincronizado", "#2E7D32"); return; }
    sb.from("painel_dados").upsert(registros).then(function (res) {
      if (res.error) status("\u26A0 falha ao salvar na nuvem", "#C0392B");
      else status("\u2601 sincronizado", "#2E7D32");
    });
  }

  function assinarTempoReal() {
    sb.channel("painel-rf")
      .on("postgres_changes",
        { event: "*", schema: "public", table: "painel_dados" },
        function (payload) {
          var nova = payload.new;
          if (!nova || CHAVES.indexOf(nova.chave) === -1) return;
          var txt = JSON.stringify(nova.valor);
          if (txt === ultimoEnviado[nova.chave]) return;
          state[nova.chave] = nova.valor;
          ultimoEnviado[nova.chave] = txt;
          try { localStorage.setItem(MAPA_LS[nova.chave], txt); } catch (e) {}
          if (nova.chave === "viagens") { migrarIdsViagens(); }
          if (nova.chave === "oleoTrocas") { migrarTrocasOleoFiltros(); }
          if (nova.chave === "usuarios" || nova.chave === "config") { garantirAcesso(); }
          if (["veiculos","dividas","manutencoes","almoxarifado"].indexOf(nova.chave) !== -1) { normalizarIdsTudo(); }

          var a = document.activeElement;
          if (a && (a.tagName === "INPUT" || a.tagName === "SELECT")) {
            renderPendente = true;
          } else {
            render();
          }
          status("\u2601 atualizado de outro PC", "#2E7D32");
        })
      .subscribe();

    document.addEventListener("focusout", function () {
      setTimeout(function () {
        var a = document.activeElement;
        if (renderPendente && !(a && (a.tagName === "INPUT" || a.tagName === "SELECT"))) {
          renderPendente = false;
          render();
        }
      }, 100);
    });
  }
})();

function rfComprimirImagem(file) {
  return new Promise(function (resolve, reject) {
    var url = URL.createObjectURL(file);
    var img = new Image();
    img.onload = function () {
      URL.revokeObjectURL(url);
      var maxDim = 1600, w = img.width, h = img.height;
      if (w > h && w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; }
      else if (h >= w && h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; }
      var canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      var q = 0.72;
      (function attempt() {
        canvas.toBlob(function (blob) {
          if (!blob) { reject(new Error("falha na compressao")); return; }
          if (blob.size > 360000 && q > 0.4) { q -= 0.1; attempt(); return; }
          resolve(blob);
        }, "image/jpeg", q);
      })();
    };
    img.onerror = function () { URL.revokeObjectURL(url); reject(new Error("erro ao ler imagem")); };
    img.src = url;
  });
}

function rfAbastExtrairValores(texto) {
  var litrosM = texto.match(/(\d{1,3}[.,]\d{2,3})\s*(?:LTS?\b|LITROS?\b|L\b)/i) ||
                texto.match(/LITROS?\s*[:\-]?\s*(\d{1,3}[.,]\d{2,3})/i);
  var litros = 0;
  if (litrosM) {
    var bruto = (litrosM[1] || litrosM[0]).replace(/[^\d,.]/g, "");
    litros = parseFloat(bruto.replace(",", "."));
    if (isNaN(litros)) litros = 0;
  }
  var valores = texto.match(/(?:R\$)?\s*(\d{1,3}(?:\.\d{3})*,\d{2})/g) || [];
  var nums = valores.map(function (v) {
    return parseFloat(v.replace(/[R$\s.]/g, "").replace(",", "."));
  }).filter(function (n) { return !isNaN(n) && n > 0; });
  var totalM = texto.match(/TOTAL[^\d]{0,12}(\d{1,3}(?:\.\d{3})*,\d{2})/i);
  var valor = 0;
  if (totalM) {
    valor = parseFloat(totalM[1].replace(/\./g, "").replace(",", "."));
  } else if (nums.length) {
    valor = Math.max.apply(null, nums);
  }
  return { litros: litros, valor: valor };
}

  var rotulo = "";
  try { var its = (m.itens && m.itens.length) ? m.itens : null; rotulo = its ? (its.map(function(i){return i.servico;}).filter(Boolean).join(", ")) : (m.servico || ""); } catch (e) { rotulo = m.servico || ""; }
  rotulo = rotulo || m.categoria || "";
  rfMtFecharNotas();
  var ov = document.createElement("div");
  ov.id = "rfMtModal";
  ov.setAttribute("style", "position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;");
  ov.onclick = function (e) { if (e.target === ov) rfMtFecharNotas(); };
  var itens = notas.length ? notas.map(function (path) {
    var nome = path.split("/").pop().replace(/^\d+-/, "");
    var isPdf = /\.pdf$/i.test(path);
    var icon = isPdf ? "📄" : "🖼️";
    return '<div style="display:flex;align-items:center;gap:10px;background:#161616;border:1px solid #2A2A2A;border-radius:6px;padding:10px 12px;margin-bottom:8px;">'
      + '<span style="font-size:20px;">' + icon + '</span>'
      + '<div style="flex:1;min-width:0;font-size:13px;color:#EAEAEA;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(nome) + '</div>'
      + '<button class="btn-outline" onclick="rfMtVerNota(\'' + path + '\')">Ver</button>'
      + '<button class="btn-del" onclick="rfMtExcluirNota(\'' + id + '\',\'' + path + '\')">✕</button>'
      + '</div>';
  }).join("") : '<div style="color:#999;font-size:13px;padding:14px 0;">Nenhuma nota anexada ainda.</div>';
  ov.innerHTML = '<div style="background:#0D0D0D;border:1px solid ' + GOLD + ';border-radius:10px;max-width:520px;width:100%;max-height:80vh;overflow:auto;padding:18px;">'
    + '<div style="display:flex;align-items:center;margin-bottom:12px;">'
    + '<div style="font-size:16px;font-weight:800;color:#fff;">🗂 Notas — ' + esc(m.placa || "") + ' <span style="font-size:12px;color:#999;font-weight:500;">' + esc(rotulo) + '</span></div>'
    + '<button class="btn-outline" style="margin-left:auto;" onclick="rfMtFecharNotas()">Fechar</button>'
    + '</div>'
    + itens
    + '<label class="btn-gold" style="display:inline-block;cursor:pointer;margin-top:6px;">+ Anexar mais<input type="file" accept="image/*,application/pdf" multiple style="display:none" onchange="rfMtUpload(this,\'' + id + '\')"></label>'
    + '<div style="font-size:11px;color:#666;margin-top:10px;">Fotos são compactadas automaticamente; PDFs sobem como estão. Tudo no mesmo bucket <b>documentos</b> da nuvem.</div>'
    + '</div>';
  document.body.appendChild(ov);
}

// ===================================================================
// ===== LEITOR DE NOTA FISCAL POR CÂMERA (OCR — gratuito, no navegador) =====
// Módulo independente: não usa state/render(), só manipula o DOM direto.
// Usa Tesseract.js (carregado sob demanda via CDN) para ler o texto da
// imagem e tenta identificar CNPJ, data, número da nota e valor total
// com expressões regulares. O usuário sempre confere/edita antes de usar.
// ===================================================================
function rfOcrCarregarLib() {
  if (window.Tesseract) return Promise.resolve();
  if (window.__rfOcrLibPromise) return window.__rfOcrLibPromise;
  window.__rfOcrLibPromise = new Promise(function (resolve, reject) {
    var s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
    s.onload = resolve;
    s.onerror = function () { reject(new Error("Falha ao carregar a biblioteca de leitura (OCR). Verifique a internet.")); };
    document.head.appendChild(s);
  });
  return window.__rfOcrLibPromise;
}

function rfOcrFechar() {
  var ov = document.getElementById("rfOcrModal");
  if (ov) ov.remove();
}

function rfOcrExtrairCampos(texto) {
  var cnpjM = texto.match(/\d{2}\.?\d{3}\.?\d{3}\/?\d{4}-?\d{2}/);
  var dataM = texto.match(/\b\d{2}\/\d{2}\/\d{4}\b/);
  var numeroM = texto.match(/N[°ºo\.]{0,2}\s*[:\-]?\s*(\d{3,9})/i);
  // Valor total: pega todos os valores em R$ e fica com o maior (geralmente é o total)
  var valores = texto.match(/(?:R\$)?\s*(\d{1,3}(?:\.\d{3})*,\d{2})/g) || [];
  var maior = 0, maiorTxt = "";
  valores.forEach(function (v) {
    var num = parseFloat(v.replace(/[R$\s.]/g, "").replace(",", "."));
    if (!isNaN(num) && num > maior) { maior = num; maiorTxt = v.trim(); }
  });
  return {
    cnpj: cnpjM ? cnpjM[0] : "",
    data: dataM ? dataM[0] : "",
    numero: numeroM ? numeroM[1] : "",
    valorTotal: maiorTxt
  };
}

function rfOcrAbrir() {
  rfOcrFechar();
  var ov = document.createElement("div");
  ov.id = "rfOcrModal";
  ov.setAttribute("style", "position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;");
  ov.onclick = function (e) { if (e.target === ov) rfOcrFechar(); };
  var box = document.createElement("div");
  box.setAttribute("style", "background:#0E0E0E;border:1px solid #2A2A2A;border-radius:14px;max-width:480px;width:100%;max-height:88vh;overflow:auto;padding:18px;");
  box.innerHTML =
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">' +
      '<div style="font-size:16px;font-weight:800;color:#fff;">📷 Ler Nota Fiscal</div>' +
      '<button class="btn-outline" style="margin-left:auto;" onclick="rfOcrFechar()">Fechar</button>' +
    '</div>' +
    '<div style="font-size:12px;color:#999;margin-bottom:12px;">Tire uma foto nítida e bem iluminada da nota. A leitura é gratuita e roda no navegador — pode falhar em notas amassadas, borradas ou manuscritas. Sempre confira os dados antes de usar.</div>' +
    '<label class="btn-gold" style="display:inline-block;cursor:pointer;">📷 Abrir câmera / escolher foto' +
      '<input id="rfOcrInput" type="file" accept="image/*" capture="environment" style="display:none">' +
    '</label>' +
    '<div id="rfOcrCorpo" style="margin-top:14px;"></div>';
  ov.appendChild(box);
  document.body.appendChild(ov);

  document.getElementById("rfOcrInput").addEventListener("change", function (ev) {
    var file = ev.target.files && ev.target.files[0];
    if (!file) return;
    rfOcrProcessar(file);
  });
}

function rfOcrProcessar(file) {
  var corpo = document.getElementById("rfOcrCorpo");
  if (!corpo) return;
  var urlPreview = URL.createObjectURL(file);
  corpo.innerHTML =
    '<img src="' + urlPreview + '" style="max-width:100%;max-height:180px;border-radius:8px;border:1px solid #333;display:block;margin-bottom:10px;">' +
    '<div id="rfOcrProgresso" style="font-size:12px;color:' + GOLD + ';">Carregando leitor... 0%</div>' +
    '<div style="background:#1A1A1A;border-radius:6px;height:8px;overflow:hidden;margin-top:6px;">' +
      '<div id="rfOcrBarra" style="background:' + GOLD + ';height:100%;width:0%;transition:width .2s;"></div>' +
    '</div>';

  rfOcrCarregarLib().then(function () {
    return Tesseract.recognize(file, "por", {
      logger: function (m) {
        var pct = m.progress ? Math.round(m.progress * 100) : 0;
        var pEl = document.getElementById("rfOcrProgresso");
        var bEl = document.getElementById("rfOcrBarra");
        if (pEl) pEl.textContent = (m.status || "processando") + "... " + pct + "%";
        if (bEl) bEl.style.width = pct + "%";
      }
    });
  }).then(function (result) {
    var texto = (result && result.data && result.data.text) || "";
    var campos = rfOcrExtrairCampos(texto);
    var corpo2 = document.getElementById("rfOcrCorpo");
    if (!corpo2) return;
    var lbl = "font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;";
    corpo2.innerHTML +=
      '<div style="margin-top:14px;padding-top:12px;border-top:1px solid #222;">' +
        '<div style="font-size:12px;font-weight:700;color:' + GOLD + ';margin-bottom:10px;">Dados encontrados (confira antes de usar)</div>' +
        '<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;">' +
          '<div><div style="' + lbl + '">CNPJ</div><input id="rfOcrCnpj" value="' + esc(campos.cnpj) + '" style="width:170px;"></div>' +
          '<div><div style="' + lbl + '">Data</div><input id="rfOcrData" value="' + esc(campos.data) + '" style="width:110px;"></div>' +
          '<div><div style="' + lbl + '">Número</div><input id="rfOcrNumero" value="' + esc(campos.numero) + '" style="width:100px;"></div>' +
          '<div><div style="' + lbl + '">Valor total</div><input id="rfOcrValor" value="' + esc(campos.valorTotal) + '" style="width:110px;"></div>' +
        '</div>' +
        '<button class="btn-outline" onclick="rfOcrCopiar()">📋 Copiar dados</button>' +
        '<div style="' + lbl + ' margin-top:12px;">Texto completo lido (role a nota se algo estiver errado acima)</div>' +
        '<textarea id="rfOcrTexto" style="width:100%;height:110px;font-size:11px;">' + esc(texto) + '</textarea>' +
      '</div>';
  }).catch(function (err) {
    var corpo3 = document.getElementById("rfOcrCorpo");
    if (corpo3) corpo3.innerHTML += '<div style="color:#C0392B;font-size:13px;margin-top:10px;">Não consegui ler a nota: ' + esc(err.message || String(err)) + '</div>';
  });
}

function rfOcrCopiar() {
  var pega = function (id) { var el = document.getElementById(id); return el ? el.value : ""; };
  var texto = "CNPJ: " + pega("rfOcrCnpj") + "\nData: " + pega("rfOcrData") + "\nNúmero: " + pega("rfOcrNumero") + "\nValor total: " + pega("rfOcrValor");
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(texto).then(function () { alert("Dados copiados! Agora é só colar no formulário certo (Manutenção, Almoxarifado, etc.)."); });
  } else {
    alert(texto);
  }
}
</script>
