<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>RF Logística — Painel da Frota (v127)</title>
<!-- v117: as 3 fotos de abastecimento (painel, bomba, nota) agora permitem
     escolher da galeria tambem, nao so tirar foto na hora -- o "capture=environment"
     forcava a camera e travava casos legitimos (ex: recuperar foto de um
     abastecimento perdido numa restauracao de backup). -->
<!-- v116: CORRECAO CRITICA -- o app nunca mais sobrescreve a nuvem so porque
     uma leitura voltou com 0 linhas. Isso causou perda TOTAL dos dados da
     empresa duas vezes no mesmo dia (qualquer soluco de rede/sessao fazia o
     app achar "primeira vez, nunca sincronizou" e subir o estado vazio local
     por cima de TUDO). Agora, se a nuvem voltar vazia, o app so avisa e para
     -- nunca decide sozinho apagar/sobrescrever os dados da equipe. -->
<!-- v115: abastecimento agora exige 3 fotos separadas -- painel (KM), visor da
     bomba (valor/litros, lido automaticamente por OCR) e nota/comprovante.
     Antes era um campo so ("bomba/comprovante"), permitindo que o motorista so
     mandasse a nota sem provar que estava fisicamente na bomba. A aprovacao
     (nova viagem ou vincular a viagem existente) agora BLOQUEIA se faltar a
     foto do visor da bomba ou da nota. Coluna nova no banco: foto_nota. -->
<!-- v114: a foto do abastecimento NUNCA MAIS preenche automaticamente a foto de
     KM de chegada da viagem -- eram coisas diferentes sendo misturadas (a foto
     de KM final da viagem e critica e nao pode ser confundida com o comprovante
     de abastecimento). A foto do abastecimento continua visivel normalmente na
     aba Abastecimento (botao "ver foto" ao lado de cada lancamento). -->
<!-- v113: corrige bug introduzido na propria v112 -- o iniciar() (que agora usa
     rfGetClient) estava sendo chamado ANTES da funcao rfGetClient existir (ela
     e definida num <script> mais abaixo no arquivo, que ainda nao tinha rodado
     nesse ponto). Isso travava a tela pra sempre em "conectando...". Agora
     espera o evento "load" da pagina antes de chamar iniciar() pela 1a vez. -->
<!-- v112: corrige bug onde o modulo que sincroniza a "caixa geral" (painel_dados)
     criava seu PROPRIO cliente Supabase com persistSession:false -- ou seja,
     nunca carregava o login de verdade e agia como anonimo o tempo todo. Isso
     so nao dava erro porque a regra antiga do banco liberava acesso geral pra
     qualquer um. Ao corrigir a seguranca do banco (RLS de painel_dados restrita
     a usuarios logados), esse modulo passou a falhar com 401 e travar o carregamento
     da frota (0 veiculos). Agora reaproveita o MESMO cliente autenticado do login
     (rfGetClient), enviando o token de sessao real em toda leitura/escrita. -->
<!-- v111: corrige bug onde o motorista editando um abastecimento (valor, litros, foto, ou a
     leitura automatica por OCR) depois que a equipe ja tinha aprovado podia REABRIR ele como
     "pendente" de novo -- o app reenviava a linha inteira (upsert) com o status desatualizado
     que o celular do motorista ainda tinha guardado localmente. Agora essas edicoes sao um
     update parcial que nunca toca no status, e so aplica se o registro ainda estiver
     "pendente" no banco -- senao a edicao e descartada e a tela recarrega os dados reais. -->
<!-- v110: separa "pago" (cliente pagando a RF Logística, prazo de 15/30/45 dias por cliente) de
     "pagoMotorista" (RF Logística pagando o motorista, ritmo semanal/quinzenal) -- checkbox novo na
     aba Motoristas > Detalhe por viagem. IMPORTANTE: a RPC motorista_resumo_viagens no Supabase
     ainda precisa ser atualizada pra ler pagoMotorista em vez de pago no calculo de "pagas" -- sem
     isso o app do motorista continua mostrando o valor antigo. -->
<!-- v109: abastecimento lancado durante uma viagem "em andamento" ja vincula sozinho (placa + viagemId), com seletor pro motorista trocar e um botao rapido "Aprovar -> viagem ja vinculada" pra equipe -->
<!-- v108: troca o "envio pro motorista" de automatico-por-placa pra escolha manual -- a equipe seleciona explicitamente QUAL motorista recebe a viagem (dropdown com nome), e as RPCs conferem pelo motoristaDesignadoUid em vez da placa -->
<!-- v95: excluir usuario (edge function excluir-usuario) + confirmacao visual ao salvar campo de perfil -->
<!-- v96: corrige sessao "presa" no papel antigo -- agora revalida com o banco toda vez que o app abre -->
<!-- v97: painel do motorista recriado do zero -- tela propria (Ola + 4 cards: viagens/pagas/a pagar/km) + abastecimento, sem nada do painel geral da frota -->
<!-- v98: motorista pode avisar "viagem finalizada" (placa/data/obs livre, sem vincular a cadastro previo) -- fica pendente, equipe aprova/rejeita na aba Abastecimento -->
<!-- v99: aprovar cria a viagem de verdade (equipe so completa valor/km depois); resumo do motorista (viagens/pagas/km) agora vem de uma funcao segura no banco (RPC motorista_resumo_viagens), porque o celular do motorista nunca baixa a caixa geral -- por isso os cards sempre mostravam 0 antes -->
<!-- v100: equipe agora tem botao "Excluir" de verdade em qualquer status (abastecimento e viagem finalizada) -- antes so existia enquanto pendente, entao depois de aprovar/rejeitar nao dava pra apagar nada; adicionado tambem "Reabrir" pra voltar um aviso de viagem pra pendente de proposito -->
<!-- v101: exclusao agora confere se realmente apagou no banco (RLS podia estar bloqueando silenciosamente, sem erro) -- se nao apagar, avisa e restaura a lista em vez de fingir que deu certo -->
<!-- v102: motorista agora anexa foto do comprovante (canhoto/nota/romaneio) no aviso de viagem finalizada -- serve de base pra equipe validar antes de aprovar -->
<!-- v103: viagens que nasceram de um aviso do motorista (abastecimento aprovado -> viagem, ou viagem finalizada aprovada) agora mostram um selo "🏁 via motorista" na aba Despesas de Viagem, com aviso "falta completar" enquanto o valor nao for preenchido -- fica claro o que foi lancado manualmente pela equipe x o que veio do motorista -->
<!-- v104: fluxo de viagem do motorista virou em duas etapas -- "+ Inicio de viagem" (status em_andamento) e depois "Concluir viagem" (so libera com a foto do KM final anexada, obrigatoria) -- so ai passa pra "aguardando equipe" -->
<!-- v105: a viagem agora nasce de verdade em Despesas de Viagem no exato momento do "Inicio de viagem" (nao so depois de aprovada) -- selo na tabela muda ao vivo: em viagem -> aguardando revisao -> aprovada/rejeitada, sincronizado com o que acontece no aviso do motorista -->
<!-- v106: corrige a v105 -- o celular do motorista e bloqueado de escrever direto na caixa geral (protecao de seguranca que ja existia), entao a viagem nunca sincronizava de verdade. Agora usa funcoes seguras no banco (RPC) que so deixam o motorista criar/mexer na PROPRIA viagem em andamento -->
<!-- v107: INVERTE o fluxo -- agora a equipe cria a viagem como sempre fez e clica "Enviar p/ motorista"; o motorista so CONFIRMA inicio (foto do KM inicial obrigatoria) e fim (foto do KM final obrigatoria) via RPC seguro. Retirado o antigo botao "+ Inicio de viagem" do lado do motorista -->

<script>
"use strict";

const GOLD = "#D4A017";
const TIPOS = ["Toco", "3/4", "Cavalo Mecânico"];
const STATUS_OP = ["Em viagem", "Disponível", "Fora de operação", "Manutenção", "Parado"];
const STATUS_BAU = ["Com baú", "Com sider", "Baú comprado", "Baú em negociação", "Sem baú"];

function numOuNull(v) { if (v === null || v === undefined || v === "") return null; const n = Number(v); return isNaN(n) ? null : n; }
// TARIFAS POR CLIENTE (configuráveis na tela, sincronizadas). Cada cliente:
//   { modo: "viagem" | "km" | "m3" | "rota", kmDefault: R$/km (Toco e demais), km34: R$/km (3/4), m3: R$/m³,
//     rotas: { "ORIGEM X DESTINO": { toco: R$, tresQuartos: R$ } },
//     admPct, manutencaoPct, pneusPorKm, impostoPct: overrides opcionais (vazio = padrão da empresa) }
// "viagem" = valor manual. "km", "m3" e "rota" auto-completam o valor.
function tarifaCliente(cliente) { return (state.tarifas && state.tarifas[cliente]) || null; }
function modoCliente(cliente) { const t = tarifaCliente(cliente); return (t && t.modo) ? t.modo : "viagem"; }
function freteKmDe(cliente, tipo) {
  const t = tarifaCliente(cliente);
  if (!t || t.modo !== "km") return 0;
  if (tipo === "3/4" && Number(t.km34) > 0) return Number(t.km34);
  return Number(t.kmDefault) || 0;
}
function freteM3De(cliente) {
  const t = tarifaCliente(cliente);
  if (!t || t.modo !== "m3") return 0;
  return Number(t.m3) || 0;
}
function freteRotaDe(cliente, rota, tipo) {
  const t = tarifaCliente(cliente);
  if (!t || t.modo !== "rota" || !rota) return 0;
  const r = (t.rotas || {})[rota];
  if (!r) return 0;
  return tipo === "3/4" ? (Number(r.tresQuartos) || 0) : (Number(r.toco) || 0);
}
function freteKmViagem(v) {
  if (v.freteKmManual) return Number(v.freteKmManualValor) || 0;   // v72: valor/km escolhido manualmente nesta viagem
  const veic = (state.veiculos || []).find((x) => x.placa === v.placa);
  return freteKmDe(v.cliente, veic ? veic.tipo : "");
}
// Handlers da config de tarifa (chamados pela tela de clientes)
function setTarifaModo(cliente, modo) {
  if (!state.tarifas) state.tarifas = {};
  const t = state.tarifas[cliente] || {};
  t.modo = modo;
  if (modo === "km" && t.kmDefault == null) { t.kmDefault = 0; t.km34 = 0; }
  if (modo === "m3" && t.m3 == null) { t.m3 = 0; }
  state.tarifas[cliente] = t;
  salvar(); render();
}
function setTarifaValor(cliente, campo, valor) {
  if (!state.tarifas) state.tarifas = {};
  const t = state.tarifas[cliente] || { modo: "viagem" };
  t[campo] = Number(String(valor).replace(",", ".")) || 0;
  state.tarifas[cliente] = t;
  salvar(); render();
}
// v120: overrides opcionais de ADM/Manutenção/Pneus/Imposto por cliente.
// Campo vazio = volta a usar o padrão da empresa (não fica 0 por engano).
function setTarifaParametro(cliente, campo, valor) {
  if (!state.tarifas) state.tarifas = {};
  const t = state.tarifas[cliente] || { modo: "viagem" };
  const s = String(valor).replace(",", ".").trim();
  t[campo] = s === "" ? null : (Number(s) || 0);
  state.tarifas[cliente] = t;
  salvar(); render();
}
// v120: tabela de rotas por cliente (ex: JT/Mateus) — origem x destino -> valor por tipo de veículo.
function adicionarRotaCliente(cliente) {
  const nome = window.prompt("Nome da rota (ex: MUQUEM DE SAO FRANCISCO X LUIS ED):");
  if (!nome || !nome.trim()) return;
  if (!state.tarifas) state.tarifas = {};
  const t = state.tarifas[cliente] || { modo: "rota" };
  if (!t.rotas) t.rotas = {};
  const chave = nome.trim().toUpperCase();
  if (!t.rotas[chave]) t.rotas[chave] = { toco: 0, tresQuartos: 0 };
  state.tarifas[cliente] = t;
  salvar(); render();
}
function setRotaValor(cliente, rota, campo, valor) {
  if (!state.tarifas) state.tarifas = {};
  const t = state.tarifas[cliente] || { modo: "rota" };
  if (!t.rotas) t.rotas = {};
  if (!t.rotas[rota]) t.rotas[rota] = { toco: 0, tresQuartos: 0 };
  t.rotas[rota][campo] = Number(String(valor).replace(",", ".")) || 0;
  state.tarifas[cliente] = t;
  salvar(); render();
}
function removerRotaCliente(cliente, rota) {
  if (!window.confirm('Remover a rota "' + rota + '"?')) return;
  const t = state.tarifas[cliente];
  if (t && t.rotas) delete t.rotas[rota];
  salvar(); render();
}
// v121: a tabela de rotas (pode ter dezenas de linhas) fica oculta por
// padrão — só abre quando a pessoa clica, pra não poluir a tela. Não é
// dado sincronizado, é só estado de tela (não precisa de salvar()).
function toggleRotasAbertas(cliente) {
  if (!state._rotasAbertas) state._rotasAbertas = {};
  state._rotasAbertas[cliente] = !state._rotasAbertas[cliente];
  render();
}

function uid() { return Math.random().toString(36).slice(2, 9); }
function fmtR(n) { return "R$ " + Number(n || 0).toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
function hojeISO() { return new Date().toISOString().slice(0, 10); }
// Aceita "YYYY-MM-DD" ou "DD/MM/AAAA". Vazio => padrao (ou hoje). Inválida => null.
function normalizarData(str, padrao) {
  str = String(str == null ? "" : str).trim();
  if (str === "") return padrao || hojeISO();
  let m = str.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) return str;
  m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return m[3] + "-" + m[2].padStart(2, "0") + "-" + m[1].padStart(2, "0");
  return null;
}
function diasPara(dataStr) {
  if (!dataStr) return null;
  return Math.ceil((new Date(dataStr) - new Date()) / 86400000);
}
function corVencimento(dias) {
  if (dias === null) return "#555";
  if (dias < 0) return "#C0392B";
  if (dias <= 30) return "#D4A017";
  return "#2E7D32";
}

// v92: dados iniciais "de fábrica" removidos do código-fonte por segurança —
// este arquivo pode circular (WhatsApp, etc.) e não deve carregar placas,
// clientes ou valores reais em texto puro. Os dados de verdade só existem
// na nuvem (Supabase), protegidos por login e RLS. Se abrir este arquivo
// pela 1ª vez sem nunca ter sincronizado, a frota some vazia — normal,
// espere a sincronização com a nuvem autenticada.
const DADOS_REAIS = [];
const FINANCEIRO_INICIAL = {};
const LOCAL_INICIAL = {};

function frotaInicial() {
  return DADOS_REAIS.map((d) => {
    const fin = FINANCEIRO_INICIAL[d.placa];
    const receitaMes = fin ? fin.bruto : 0;
    const custoMes = fin ? fin.bruto - fin.liquido : 0;
    return {
      id: uid(), placa: d.placa, tipo: d.tipo, modelo: d.modelo, bau: d.bau,
      motorista: "", statusOp: d.statusOp, viagensMes: 0, kmMes: 0,
      venctoSeguro: "", venctoCronotacografo: "", ultimaRevisao: "",
      custoMes, receitaMes, divida: 0, local: LOCAL_INICIAL[d.placa] || "", obs: d.obs,
    };
  });
}
function dividasIniciais() {
  // v92: valores reais removidos do código-fonte por segurança (ver DADOS_REAIS acima).
  return [];
}

function carregar(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return fallback();
}
// ===== Sessão de acesso — LOCAL por aparelho, nunca sincroniza (como mesAtivo) =====
function carregarSessaoLocal() {
  try {
    const raw = localStorage.getItem("rf-frota-sessao-v1");
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return null; // null = ninguém logado neste aparelho
}
function salvarSessaoLocal() {
  try {
    if (state.sessao) localStorage.setItem("rf-frota-sessao-v1", JSON.stringify(state.sessao));
    else localStorage.removeItem("rf-frota-sessao-v1");
  } catch (e) {}
}
function salvar() {
  window.__rfVerSalvo = (window.__rfVerSalvo || 0) + 1; // invalida cache do tanque de combustível (v69)
  try {
    localStorage.setItem("rf-frota-veiculos-v4", JSON.stringify(state.veiculos));
    localStorage.setItem("rf-frota-dividas-v1", JSON.stringify(state.dividas));
    localStorage.setItem("rf-frota-viagens-v1", JSON.stringify(state.viagens));
    localStorage.setItem("rf-frota-clientes-v1", JSON.stringify(state.clientes));
    localStorage.setItem("rf-frota-manutencoes-v1", JSON.stringify(state.manutencoes));
    localStorage.setItem("rf-frota-fechamentos-v1", JSON.stringify(state.fechamentos));
    localStorage.setItem("rf-frota-frotames-v1", JSON.stringify(state.frotaMes));
    localStorage.setItem("rf-frota-config-v1", JSON.stringify(state.config));
    localStorage.setItem("rf-frota-almox-v1", JSON.stringify(state.almoxarifado));
    localStorage.setItem("rf-frota-tarifas-v1", JSON.stringify(state.tarifas));
    localStorage.setItem("rf-frota-oleotrocas-v1", JSON.stringify(state.oleoTrocas));
    localStorage.setItem("rf-frota-usuarios-v1", JSON.stringify(state.usuarios));
    localStorage.setItem("rf-frota-pagamotorista-v1", JSON.stringify(state.pagamentosMotorista));
    localStorage.setItem("rf-frota-abastecimentos-v1", JSON.stringify(state.abastecimentos));
    localStorage.setItem("rf-frota-viagensfim-v1", JSON.stringify(state.viagensFinalizadas));
  } catch (e) {}
}

let state = {
  veiculos: carregar("rf-frota-veiculos-v4", frotaInicial),
  dividas: carregar("rf-frota-dividas-v1", dividasIniciais),

/* ===== Migração de dívidas com prazo (v42) ==============================
   Versões antigas guardavam só "parcelasRestantes" (texto), que não sabia
   em que mês a contagem começava. Agora cada dívida com prazo tem:
     parcelasTotal -> nº total de parcelas (ex: 6)
     mesInicio     -> "AAAA-MM" da 1ª parcela
   Com isso o sistema calcula sozinho a parcela do mês (ex: 3/6) e ZERA a
   dívida depois da última. Esta migração converte os dados antigos: se a
   dívida tinha parcelasRestantes numérico e ainda não tem os campos novos,
   assume que essas parcelas começam a contar no mês atual. */
(function migrarDividasPrazo() {
  const mesHoje = new Date().toISOString().slice(0, 7);
  (state.dividas || []).forEach((d) => {
    if (d.parcelasTotal === undefined) d.parcelasTotal = "";
    if (d.mesInicio === undefined) d.mesInicio = "";
    if (!d.historicoCampos || typeof d.historicoCampos !== "object") d.historicoCampos = {};
    const legado = parseInt(d.parcelasRestantes, 10);
    if (!d.parcelasTotal && !d.mesInicio && Number.isFinite(legado) && legado > 0) {
      d.parcelasTotal = String(legado);
      d.mesInicio = mesHoje;
    }
    delete d.parcelasRestantes; // não usamos mais
  });
})();

/* ===== Contexto GLOBAL de mês (v33) =====================================
   Campos abaixo viram dados POR MÊS (zeram em mês novo, voltam ao retornar).
   Cadastro do veículo (placa, modelo, motorista, tipo, baú, vencimentos,
   kmAtual) fica no objeto e NUNCA zera. Os números do mês ficam em
   state.frotaMes[mes][veiculoId]. O mês ativo é LOCAL de cada aparelho. */
const CAMPOS_MES = ["statusOp","viagensMes","kmMes","divida","local","obs"];
function blankMesRec() {
  return { statusOp: "Disponível", viagensMes: 0, kmMes: 0, divida: 0, local: "", obs: "" };
}
// receitaMes e custoMes (Bruto/Custo manual = aluguel fixo) são RECORRENTES da
// frota: ficam no próprio veículo e sobem para o Financeiro TODO mês.
// Leitura SEM criar registro (não suja o frotaMes a cada render)
function mesVLer(v) {
  const m = state.frotaMes && state.frotaMes[state.mesAtivo];
  return (m && m[v.id]) ? m[v.id] : blankMesRec();
}
// Leitura/escrita CRIANDO o registro do mês ativo
function mesV(v) {
  if (!state.frotaMes) state.frotaMes = {};
  const mes = state.mesAtivo;
  if (!state.frotaMes[mes]) state.frotaMes[mes] = {};
  if (!state.frotaMes[mes][v.id]) state.frotaMes[mes][v.id] = blankMesRec();
  return state.frotaMes[mes][v.id];
}
// Veículos com os campos do mês ativo já mesclados (para render/cálculos/exports)
function veiculosComMes() {
  return state.veiculos.map((v) => {
    const rec = mesVLer(v);
    const o = Object.assign({}, v);            // cadastro + recorrentes (receita/custo) ficam
    CAMPOS_MES.forEach((c) => { o[c] = rec[c]; }); // só os campos do mês são sobrepostos
    if (rec.receitaMes != null) o.receitaMes = rec.receitaMes; // v47: override manual por mês
    if (rec.custoMes   != null) o.custoMes   = rec.custoMes;
    return o;
  });
}
// Migração única: na 1ª abertura do v33, semeia o mês atual a partir dos
// campos antigos que estavam no próprio veículo. Escreve direto no
// localStorage (NÃO marca edição local → o pull da nuvem sempre vence).
function migrarFrotaMes() {
  if (state.frotaMes && Object.keys(state.frotaMes).length > 0) return;
  state.frotaMes = {};
  const mes = state.mesAtivo;
  state.frotaMes[mes] = {};
  state.veiculos.forEach((v) => {
    state.frotaMes[mes][v.id] = {
      statusOp: v.statusOp || "Disponível",
      viagensMes: Number(v.viagensMes) || 0,
      kmMes: Number(v.kmMes) || 0,
      divida: Number(v.divida) || 0,
      local: v.local || "",
      obs: v.obs || "",
    };
  });
  try { localStorage.setItem("rf-frota-frotames-v1", JSON.stringify(state.frotaMes)); } catch (e) {}
}

// v38: normaliza ids de viagens. Versões antigas gravavam id numérico (ou
// sem id), e o botão de apagar/editar envia o id como TEXTO. A comparação
// (numero !== texto) dava sempre verdadeiro, então viagens antigas não
// saíam nem editavam. Aqui todo id vira texto único; ids vazios/duplicados
// recebem um uid novo. Roda no boot e a cada sincronização (self-heal).
function migrarIdsViagens() {
  if (!Array.isArray(state.viagens)) return false;
  const vistos = {};
  let mudou = false;
  state.viagens.forEach((v) => {
    let id = (v.id == null) ? "" : String(v.id);
    if (id === "" || vistos[id]) { id = uid(); mudou = true; }     // faltando ou duplicado
    else if (id !== v.id) { mudou = true; }                        // era número -> virou texto
    v.id = id;
    vistos[id] = true;
  });
  if (mudou) { try { localStorage.setItem("rf-frota-viagens-v1", JSON.stringify(state.viagens)); } catch (e) {} }
  return mudou;
}

// v40: normaliza TODOS os ids para texto (veículos, dívidas, manutenções+itens,
// almoxarifado+movimentos). Registros antigos tinham id numérico e os botões
// mandam id como texto -> a comparação === / !== falhava e o "excluir" não
// removia nada (o registro voltava com as mesmas configurações).
function normalizarIdsTudo() {
  function fixLista(lista) {
    if (!Array.isArray(lista)) return false;
    var mud = false;
    lista.forEach(function (r) {
      if (r && r.id != null && typeof r.id !== "string") { r.id = String(r.id); mud = true; }
    });
    return mud;
  }
  var mudou = false;
  if (fixLista(state.veiculos)) mudou = true;
  if (fixLista(state.dividas)) mudou = true;
  if (Array.isArray(state.manutencoes)) {
    if (fixLista(state.manutencoes)) mudou = true;
    state.manutencoes.forEach(function (m) { if (m && fixLista(m.itens)) mudou = true; });
  }
  if (Array.isArray(state.almoxarifado)) {
    if (fixLista(state.almoxarifado)) mudou = true;
    state.almoxarifado.forEach(function (it) {
      if (it && fixLista(it.entradas)) mudou = true;
      if (it && fixLista(it.saidas)) mudou = true;
    });
  }
  if (mudou) {
    try {
      localStorage.setItem("rf-frota-veiculos-v4", JSON.stringify(state.veiculos));
      localStorage.setItem("rf-frota-dividas-v1", JSON.stringify(state.dividas));
      localStorage.setItem("rf-frota-manutencoes-v1", JSON.stringify(state.manutencoes));
      localStorage.setItem("rf-frota-almox-v1", JSON.stringify(state.almoxarifado));
    } catch (e) {}
  }
  return mudou;
}

// Promoção única (v35): receita/custo manual deixaram de ser mensais e viraram
// recorrentes do veículo. Recupera valores que foram digitados no v33/v34 (e
// foram parar no overlay do mês) trazendo-os de volta para o veículo.
function promoverReceitaRecorrente() {
  try { if (localStorage.getItem("rf-frota-promov-receita-v35")) return; } catch (e) {}
  const meses = state.frotaMes ? Object.keys(state.frotaMes).sort() : [];
  let mudou = false;
  state.veiculos.forEach((v) => {
    // pega o valor mais recente que exista em qualquer mês do overlay
    for (let i = meses.length - 1; i >= 0; i--) {
      const r = state.frotaMes[meses[i]][v.id];
      if (!r) continue;
      if ((!v.receitaMes || Number(v.receitaMes) === 0) && r.receitaMes != null && Number(r.receitaMes) !== 0) { v.receitaMes = Number(r.receitaMes) || 0; mudou = true; }
      if ((!v.custoMes   || Number(v.custoMes)   === 0) && r.custoMes   != null && Number(r.custoMes)   !== 0) { v.custoMes   = Number(r.custoMes)   || 0; mudou = true; }
      if ((v.receitaMes && Number(v.receitaMes) !== 0) && (v.custoMes && Number(v.custoMes) !== 0)) break;
    }
  });
  try { localStorage.setItem("rf-frota-promov-receita-v35", "1"); } catch (e) {}
  if (mudou) { try { localStorage.setItem("rf-frota-veiculos-v4", JSON.stringify(state.veiculos)); } catch (e) {} }
}

// v54: ao lançar uma viagem, preenche o "Local alocado" do veículo (no mês
// ativo) com o cliente/local da viagem, MAS só se estiver vazio — nunca
// sobrescreve o que já foi preenchido manualmente.
function preencherLocalSeVazio(placa, localSugerido) {
  if (!placa || !localSugerido) return;
  const v = state.veiculos.find((x) => x.placa === placa);
  if (!v) return;
  const rec = mesV(v); // cria/lê o registro do mês ativo
  if (!rec.local || !String(rec.local).trim()) {
    rec.local = localSugerido;
  }
}
function atualizarVeiculo(id, campo, valor) {

  if (!v) return;
  if (CAMPOS_MES.indexOf(campo) !== -1) { mesV(v)[campo] = valor; }  // campo do mês
  else if (campo === "receitaMes" || campo === "custoMes") { mesV(v)[campo] = valor; } // v47: manual por mês (não vaza p/ outros meses)
  else { v[campo] = valor; }                                         // cadastro fixo
  salvar();
  render();
}
// v82: "Bruto/mês" e "Custo/mês" têm um valor RECORRENTE "de fábrica" no cadastro do
// veículo (v.receitaMes / v.custoMes) que se aplica em TODO mês que não tiver um valor
// próprio salvo — pensado pra caminhão de aluguel fixo (ex: contrato Leão). Em caminhão
// pago por viagem (ex: JDL/Mercante) esse recorrente não devia existir, mas não havia
// como zerá-lo pela tela — editar o campo no Financeiro só cria um valor daquele mês,

  v[campo] = 0;

}

// v79: mesma lógica de vigência que já existia pro VALOR (v71), agora generalizada pra
// TODOS os campos da dívida fixa (descrição, vencimento, parcelas, mês início, obs).
// Editar qualquer campo agora só vale a partir do mês ativo (state.mesAtivo) pra frente —
// meses já fechados/passados continuam com o que já estava valendo neles.
function atualizarDivida(id, campo, valor) {
  const d = state.dividas.find((x) => String(x.id) === String(id));
  if (!d) return;
  const mesRef = state.mesAtivo || new Date().toISOString().slice(0, 7);
  if (!d.historicoCampos || typeof d.historicoCampos !== "object") d.historicoCampos = {};
  let hist = Array.isArray(d.historicoCampos[campo]) ? d.historicoCampos[campo] : [];
  // se o campo ainda não tinha histórico, primeiro registra o valor antigo como vigente "desde sempre"
  if (hist.length === 0 && d[campo] !== valor) {
    hist.push({ desde: "0000-00", valor: d[campo] });
  }
  // edição repetida no mesmo mês só atualiza a vigência daquele mês, não duplica
  hist = hist.filter((h) => h.desde !== mesRef);
  hist.push({ desde: mesRef, valor });
  hist.sort((a, b) => (a.desde < b.desde ? -1 : a.desde > b.desde ? 1 : 0));
  d.historicoCampos[campo] = hist;
  d[campo] = valor; // valor "atual" — usado como padrão/legado e no cadastro
  salvar(); render();
}
// Valor de um CAMPO de dívida fixa NO MÊS informado, respeitando o histórico de vigências (v79).
function campoDividaNoMes(d, campo, mes) {
  const hist = d.historicoCampos && d.historicoCampos[campo];
  if (Array.isArray(hist) && hist.length) {
    let aplicavel = null;
    for (const h of hist) {
      if (h.desde <= mes) aplicavel = h; else break; // já vem ordenado por 'desde'
    }
    if (aplicavel) return aplicavel.valor;
    return hist[0].valor; // mês pedido é anterior a toda a história registrada
  }
  return d[campo]; // campo sem histórico (nunca editado) — comportamento de sempre
}
// v71: alterar o VALOR de uma dívida fixa não pode reescrever meses já fechados/passados.
// Cada mudança de valor vira uma "vigência" a partir do mês ativo (state.mesAtivo) — meses
// anteriores a essa vigência continuam com o valor que já estava valendo neles.
function atualizarValorDivida(id, valor) {
  const d = state.dividas.find((x) => String(x.id) === String(id));
  if (!d) return;
  const novo = Number(String(valor).replace(",", ".")) || 0;
  const mesRef = state.mesAtivo || new Date().toISOString().slice(0, 7);
  if (!Array.isArray(d.historicoValor)) d.historicoValor = [];
  // se a dívida ainda não tinha histórico, primeiro registra o valor antigo como vigente "desde sempre"
  if (d.historicoValor.length === 0 && Number(d.valorMes) !== novo) {
    d.historicoValor.push({ desde: "0000-00", valor: Number(d.valorMes) || 0 });
  }
  // edição repetida no mesmo mês só atualiza a vigência daquele mês, não duplica
  d.historicoValor = d.historicoValor.filter((h) => h.desde !== mesRef);
  d.historicoValor.push({ desde: mesRef, valor: novo });
  d.historicoValor.sort((a, b) => (a.desde < b.desde ? -1 : a.desde > b.desde ? 1 : 0));
  d.valorMes = novo; // valor "atual" — usado como padrão/legado e no cadastro
  salvar(); render();
}
// Valor de uma dívida fixa NO MÊS informado, respeitando o histórico de vigências.
function valorDividaNoMes(d, mes) {
  if (Array.isArray(d.historicoValor) && d.historicoValor.length) {
    let aplicavel = null;
    for (const h of d.historicoValor) {
      if (h.desde <= mes) aplicavel = h; else break; // já vem ordenado por 'desde'
    }
    if (aplicavel) return aplicavel.valor;
    return d.historicoValor[0].valor; // mês pedido é anterior a toda a história registrada
  }
  return Number(d.valorMes) || 0; // dívida sem histórico (nunca editada) — comportamento de sempre
}
function adicionarDivida() {
  // v79: mesInicio nasce = mês ativo (não parcelasTotal, continua "sem fim" por padrão) —
  // assim uma dívida nova não aparece retroativamente em meses já fechados.
  const mesRef = state.mesAtivo || new Date().toISOString().slice(0, 7);
  state.dividas.push({ id: uid(), descricao: "", valorMes: 0, parcelasTotal: "", mesInicio: mesRef, diaVencimento: "", obs: "", historicoValor: [], historicoCampos: {} });
  salvar(); render();
}

  state.dividas = state.dividas.filter((d) => String(d.id) !== String(id));
  salvar(); render();
}

function calcSetQtd(id, v) {

/* ===================== IMPOSTO AUDITÁVEL (v36) =====================

/* ===================== TANQUE VIRTUAL DE COMBUSTÍVEL (v69) =====================
   Antes, o valor gasto no abastecimento virava despesa 100% daquela viagem —
   mesmo quando sobrava diesel pra próxima. Agora cada abastecimento (litros +
   valor pago) entra num "tanque virtual" por placa, e cada viagem consome dele
   só o que precisou (km ÷ km/L do veículo), pelo preço médio do tanque no
   momento. O que sobra fica disponível pra próxima viagem daquele veículo.
   Itens antigos sem "litros" preenchido continuam contando como despesa
   direta (compatibilidade com lançamentos anteriores ao v69). */
function kmPorLitroDoVeiculo(placa) {
  const v = state.veiculos.find((x) => x.placa === placa);

let _tanqueCacheVer = null;
let _tanqueCacheVal = null;
function calcularTanques() {
  if (_tanqueCacheVer === window.__rfVerSalvo && _tanqueCacheVal) return _tanqueCacheVal;
  const porPlaca = {};
  const porViagem = {};
  const ordenadas = (state.viagens || []).slice().sort((a, b) => {
    const da = a.data || "", db = b.data || "";
    if (da !== db) return da < db ? -1 : 1;
    // mesmo dia: desempata pela ordem real em que a viagem foi lançada
    // (criadoEm). Lançamentos antigos sem criadoEm mantêm a ordem original
    // do array (sort é estável), que já é a ordem cronológica de cadastro.
    const ca = a.criadoEm || 0, cb = b.criadoEm || 0;
    return ca - cb;
  });
  ordenadas.forEach((v) => {
    const placa = v.placa;
    if (!porPlaca[placa]) porPlaca[placa] = { litros: 0, valor: 0 };
    const tanque = porPlaca[placa];
    let extraDireta = 0;
    (v.combustivelItens || []).forEach((item) => {
      const litros = Number(item.litros) || 0;
      const valor = Number(item.valor) || 0;
      if (litros > 0) { tanque.litros += litros; tanque.valor += valor; }      // entrada no tanque
      else if (valor > 0) { extraDireta += valor; }                             // lançamento antigo (sem litros) = despesa direta
    });
    const kml = kmPorLitroDoVeiculo(placa);
    const km = Number(v.km) || 0;
    const litrosNecessarios = kml > 0 ? km / kml : 0;
    const precoMedio = tanque.litros > 0.0001 ? (tanque.valor / tanque.litros) : 0;
    const litrosUsados = Math.min(litrosNecessarios, tanque.litros);
    const custoConsumo = litrosUsados * precoMedio;
    tanque.litros -= litrosUsados;
    tanque.valor -= custoConsumo;
    if (tanque.litros < 0.0001) { tanque.litros = 0; tanque.valor = 0; }
    porViagem[v.id] = {
      custo: custoConsumo + extraDireta,
      litrosConsumidos: litrosNecessarios,
      precoLitroUsado: precoMedio,
      faltouLitros: Math.max(0, litrosNecessarios - litrosUsados),
    };
  });
  _tanqueCacheVer = window.__rfVerSalvo;
  _tanqueCacheVal = { porViagem, saldoPorPlaca: porPlaca };
  return _tanqueCacheVal;
}

// v76: além dos custos de viagem, traz também a receita recorrente do mês (aluguel fixo — ex: caminhões

function custosPorCategoriaDoMes(mes) {
  const viagensMes = (state.viagens || []).filter((v) => v.data && v.data.slice(0, 7) === mes);
  const cat = { adm: 0, manutencao: 0, imposto: 0, pneus: 0, alimMotorista: 0, alimAjudante: 0, combustivel: 0, pagMotorista: 0, pagAjudante: 0, outros: 0 };
  let totalDesp = 0, valorViagens = 0, sobraTotal = 0;
  viagensMes.forEach((v) => {
    const c = calcularViagem(v);
    cat.adm += c.adm; cat.manutencao += c.manutencao; cat.imposto += c.imposto; cat.pneus += c.pneus;
    cat.alimMotorista += c.alimMotorista; cat.alimAjudante += c.alimAjudante; cat.combustivel += c.combustivel;
    cat.pagMotorista += c.pagMotorista; cat.pagAjudante += c.pagAjudante; cat.outros += c.outros;
    totalDesp += c.totalDesp; valorViagens += c.valorViagem; sobraTotal += c.sobra;

  const fech = fechamentoDe(mes);

  const custoFixoFrota = fech.custoManualOverride != null ? Number(fech.custoManualOverride) : rec.custoManual;
  const receitaTotal = valorViagens + receitaAluguelFixo;
  return { qtdViagens: viagensMes.length, cat, totalDesp, valorViagens, sobraTotal, dividasFixasMes, totalGeral: totalDesp + dividasFixasMes, receitaAluguelFixo, custoFixoFrota, receitaTotal };
}
function calcularViagem(v) {
  const valorViagem = Number(v.valorViagem) || 0;
  const km = Number(v.km) || 0;
  const dias = Number(v.dias) || 1;
  // v120: cada cliente pode ter ADM/Manutenção/Pneus/Imposto próprios (configurável
  // na aba Clientes, em "parâmetros avançados"). Vazio = usa o padrão da empresa.
  const t = tarifaCliente(v.cliente) || {};
  const admPct = numOuNull(t.admPct) != null ? numOuNull(t.admPct) / 100 : 0.025;
  const manutPct = numOuNull(t.manutencaoPct) != null ? numOuNull(t.manutencaoPct) / 100 : 0.03;
  const pneusRate = numOuNull(t.pneusPorKm) != null ? numOuNull(t.pneusPorKm) : 0.12;
  const impostoPctCliente = numOuNull(t.impostoPct) != null ? numOuNull(t.impostoPct) / 100 : impostoFator();
  const adm = valorViagem * admPct;
  const manutencao = valorViagem * manutPct;
  const imposto = valorViagem * impostoPctCliente;
  const pneus = km * pneusRate;
  const temAjudante = v.temAjudante !== false;
  const alimMotorista = dias * 80;
  const alimAjudante = temAjudante ? dias * 80 : 0;
  const infoComb = calcularTanques().porViagem[v.id] || { custo: 0, litrosConsumidos: 0, precoLitroUsado: 0, faltouLitros: 0 };
  const combustivel = infoComb.custo;
  const pagMotorista = Number(v.vgPagMotorista) || 0;
  const pagAjudante = temAjudante ? (Number(v.vgPagAjudante) || 0) : 0;
  const outros = (v.outrosItens || []).reduce((s, item) => s + (Number(item.valor) || 0), 0);
  const totalDesp = adm + manutencao + imposto + pneus + alimMotorista + alimAjudante + combustivel + pagMotorista + pagAjudante + outros;
  const sobra = valorViagem - totalDesp;
  return {
    valorViagem, km, dias, adm, manutencao, imposto, pneus, alimMotorista, alimAjudante, combustivel, pagMotorista, pagAjudante, outros, totalDesp, sobra,
    litrosConsumidos: infoComb.litrosConsumidos, precoLitroUsado: infoComb.precoLitroUsado, faltouLitros: infoComb.faltouLitros,
  };
}

// Auto-preenchimento conforme o modo do cliente.
// origem = "km" | "m3" (preenche valor) | "valor" (preenche km/m3) | "auto"
function aplicarFreteKm(v, origem) {
  const modo = v.freteKmManual ? "km" : modoCliente(v.cliente);   // v72: manual força modo "km" com o valor/km da viagem
  if (modo === "km") {
    const rate = freteKmViagem(v);
    if (!rate) return;
    const km = Number(v.km) || 0, valor = Number(v.valorViagem) || 0;
    if (origem === "km") v.valorViagem = Math.round(km * rate * 100) / 100;
    else if (origem === "valor") v.km = Math.round(valor / rate);
    else { if (km > 0) v.valorViagem = Math.round(km * rate * 100) / 100; else if (valor > 0) v.km = Math.round(valor / rate); }
  } else if (modo === "m3") {
    const rate = freteM3De(v.cliente);
    if (!rate) return;
    const m3 = Number(v.m3) || 0, valor = Number(v.valorViagem) || 0;
    if (origem === "m3") v.valorViagem = Math.round(m3 * rate * 100) / 100;
    else if (origem === "valor") v.m3 = Math.round((valor / rate) * 100) / 100;
    else { if (m3 > 0) v.valorViagem = Math.round(m3 * rate * 100) / 100; else if (valor > 0) v.m3 = Math.round((valor / rate) * 100) / 100; }
  } else if (modo === "rota") {

    // conforme o tipo do veículo escalado (Toco ou 3/4).
    if (!v.rota) return;

    const valorRota = freteRotaDe(v.cliente, v.rota, veic ? veic.tipo : "");
    if (valorRota > 0) v.valorViagem = valorRota;
  }
  // modo "viagem": valor é manual, não mexe.

function csvEscape(v) {
  const s = String(v == null ? "" : v).replace(/"/g, '""');
  return /[",;\n]/.test(s) ? `"${s}"` : s;
}
// v118: "Exportar Excel" baixava um .csv (não um Excel de verdade). Isso
// causava planilhas quebradas/corrompidas ao abrir em alguns celulares e ao
// reenviar por WhatsApp. Agora gera um .xlsx binário real via SheetJS —
// com fallback pro .csv antigo só se a biblioteca não carregar (ex: sem internet).
function exportarCSV(filename, cabecalho, linhasArr) {
  const nomeXlsx = filename.replace(/\.csv$/i, ".xlsx");
  if (window.XLSX) {
    try {
      const linhasNum = linhasArr.map((linha) => linha.map((v) => {
        if (typeof v === "number") return v;
        const n = Number(v);
        return (v !== "" && v != null && !isNaN(n) && /^-?\d+([.,]\d+)?$/.test(String(v).trim())) ? n : v;
      }));
      const ws = XLSX.utils.aoa_to_sheet([cabecalho, ...linhasNum]);
      ws["!cols"] = cabecalho.map((h, i) => {
        let max = String(h || "").length;
        linhasArr.forEach((l) => { const s = String(l[i] == null ? "" : l[i]); if (s.length > max) max = s.length; });
        return { wch: Math.min(Math.max(max + 2, 8), 40) };
      });
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Dados");
      XLSX.writeFile(wb, nomeXlsx);
      return;
    } catch (e) { /* cai pro fallback abaixo */ }
  }
  const linhas = [cabecalho.join(";")];
  linhasArr.forEach((linha) => linhas.push(linha.map(csvEscape).join(";")));
  const csv = "\uFEFF" + linhas.join("\r\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ---- Itens (peças/serviços) dentro de um lançamento ----
// Migração: lançamentos antigos tinham servico/pecas/valor soltos. Converte para itens[].
function mtItens(m) {
  if (m.itens && Array.isArray(m.itens) && m.itens.length) {
    // garante campos de origem em itens antigos (v36)
    m.itens.forEach((it) => {
      if (!it.origem) it.origem = "local";
      if (it.almoxId == null) it.almoxId = "";
      if (it.qtd == null) it.qtd = 1;
      if (it.custoUnitSnap == null) it.custoUnitSnap = 0;
    });
    return m.itens;
  }
  m.itens = [{ id: uid(), servico: m.servico || "", pecas: m.pecas || "", valor: Number(m.valor) || 0, origem: "local", almoxId: "", qtd: 1, custoUnitSnap: 0 }];
  return m.itens;
}
function mtSomaPecas(m) {
  return mtItens(m).reduce((s, it) => s + (Number(it.valor) || 0), 0);
}
// v87: peça que veio do almoxarifado já foi paga (cartão/boleto/dívida fixa) na hora da
// ENTRADA no estoque — contar de novo aqui na manutenção seria dobrar o gasto. Só a peça
// "comprada no local" (fora do estoque) e a mão de obra são gasto novo deste lançamento.
function mtSomaPecasReal(m) {
  return mtItens(m).reduce((s, it) => s + (it.origem === "almox" ? 0 : (Number(it.valor) || 0)), 0);
}
function mtSomaPecasAlmox(m) {
  return mtItens(m).reduce((s, it) => s + (it.origem === "almox" ? (Number(it.valor) || 0) : 0), 0);
}

function definirAlmoxItem(mId, itemId, almoxId) {

  if (ai && (!it.pecas || it.pecas.trim() === "")) it.pecas = ai.nome || "";

function definirQtdAlmoxItem(mId, itemId, qtd) {

// valor do item de almox = quantidade × custo unitário congelado
function recalcItemAlmox(it) {
  if (it.origem !== "almox") return;
  it.valor = (Number(it.qtd) || 0) * (Number(it.custoUnitSnap) || 0);

// estado do alerta de um lançamento
function alertaManutencao(m) {
  if (m.categoria === "Garantia") {
    if (!m.data || !m.garantiaMeses) return { txt: "—", cor: "#666" };
    const venc = new Date(m.data);
    venc.setMonth(venc.getMonth() + (Number(m.garantiaMeses) || 0));
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const dias = Math.round((venc - hoje) / 86400000);
    if (dias >= 0) return { txt: "🟢 na garantia até " + venc.toLocaleDateString("pt-BR"), cor: "#2E7D32" };
    return { txt: "⚫ garantia vencida (" + venc.toLocaleDateString("pt-BR") + ")", cor: "#888" };
  }
  const intervalo = m.categoria === "Pneus" ? MT_PNEU_KM : (Number(m.intervalKm) || 0);
  if (!intervalo || !m.km) return { txt: "—", cor: "#666" };
  const proximo = (Number(m.km) || 0) + intervalo;
  const falta = proximo - kmAtualDe(m.placa);
  if (falta <= 0) {
    if (m.categoria === "Pneus" && !m.justificativa) {
      return { txt: "🔴 TROCAR (passou " + Math.abs(falta).toLocaleString("pt-BR") + " km) — justifique", cor: "#C0392B", exigeJust: true };
    }
    return { txt: "🔴 trocar — venceu há " + Math.abs(falta).toLocaleString("pt-BR") + " km", cor: "#C0392B" };
  }
  if (falta <= 1000) return { txt: "🟡 faltam " + falta.toLocaleString("pt-BR") + " km", cor: "#D4A017" };
  return { txt: "🟢 faltam " + falta.toLocaleString("pt-BR") + " km", cor: "#2E7D32" };
}

    somaPecas.toFixed(2), somaPecasAlmox.toFixed(2), mao.toFixed(2), (somaPecas + mao).toFixed(2), (somaPecas + mao - somaPecasAlmox).toFixed(2),
    m.pagamento, m.km || 0,
    m.categoria === "Pneus" ? MT_PNEU_KM : (m.intervalKm || ""),
    m.categoria === "Garantia" ? (m.garantiaMeses || "") : "",
    (m.investimento || m.categoria === "Estrutural") ? "Sim" : "Não",
    m.jaEmDividaFixa ? "Sim" : "Não",
    alertaManutencao(m).txt.replace(/[🔴🟡🟢⚫]/g, "").trim(),
  ]; });
  exportarCSV("rf-frota-manutencao-custos-" + new Date().toISOString().slice(0,10) + ".csv", cab, linhas);
}

function calcularManutencao() {
  // Buckets: Manutenção real (desce no lucro) vs Investimento/benfeitoria (à parte)
  // vs já em Dívida Fixa (à parte também — já desconta lá, não pode contar 2x aqui).
  // v87: peça do almoxarifado NUNCA entra no "real" — já foi paga na entrada do estoque
  // (cartão/boleto/dívida fixa). Só mão de obra + peça comprada no local são gasto novo.
  const CAT_REAL = ["Preventiva", "Corretiva", "Pneus", "Garantia", "Outros"];
  let real = 0, investimento = 0, jaEmDivida = 0, estoqueAlmox = 0;
  const porCategoria = {};
  const porPlaca = {};
  (state.manutencoes || []).forEach((m) => {
    if (!m.data || m.data.slice(0, 7) !== state.mesAtivo) return;  // só o mês ativo (v33)
    const vAlmox = mtSomaPecasAlmox(m);
    const vReal = mtSomaPecasReal(m) + (Number(m.maoObra) || 0); // peça local + mão de obra (sem peça de estoque)
    const vTotal = vReal + vAlmox;
    estoqueAlmox += vAlmox;
    const ehDivida = m.jaEmDividaFixa === true;
    const ehInv = m.investimento === true || m.categoria === "Estrutural";
    if (ehDivida) jaEmDivida += vReal;
    else if (ehInv) investimento += vReal;
    else real += vReal;
    porCategoria[m.categoria] = (porCategoria[m.categoria] || 0) + vTotal;
    if (!porPlaca[m.placa]) porPlaca[m.placa] = { real: 0, inv: 0 };
    if (!ehDivida) { if (ehInv) porPlaca[m.placa].inv += vReal; else porPlaca[m.placa].real += vReal; }
  });
  return { real, investimento, jaEmDivida, estoqueAlmox, porCategoria, porPlaca };
}

/* ===================== GRÁFICOS — VISÃO GERAL DA FROTA (v89) =====================
   Agrega viagens + manutenções + abastecimentos por placa, num período
   escolhido (mês específico ou todo o histórico), pra alimentar os
   gráficos (Chart.js) da aba "📈 Gráficos". Não duplica: o custo de
   combustível já embutido em cada viagem (tanque virtual) é o mesmo
   usado no Financeiro; manutenção aqui soma só o gasto REAL (exclui
   investimento/estrutural e o que já está em dívida fixa, igual à
   aba Análise de Custos). */
function graficosPeriodoBate(dataStr, periodo) {
  if (!dataStr) return false;
  if (!periodo || periodo === "todos") return true;
  return dataStr.slice(0, 7) === periodo;
}
function graficosDadosFrota(periodo) {
  const porPlaca = {};
  const zero = () => ({ custoViagens: 0, combustivel: 0, adm: 0, imposto: 0, pneus: 0, alim: 0, pag: 0, outros: 0, km: 0, qtdViagens: 0, receita: 0, manutencaoReal: 0, qtdManut: 0, litrosAbast: 0, valorAbast: 0 });
  state.veiculos.forEach((v) => { if (v.placa) porPlaca[v.placa] = zero(); });
  (state.viagens || []).forEach((v) => {
    if (!graficosPeriodoBate(v.data, periodo)) return;
    if (!v.placa) return;
    if (!porPlaca[v.placa]) porPlaca[v.placa] = zero();
    const c = calcularViagem(v);
    const p = porPlaca[v.placa];
    p.custoViagens += c.totalDesp; p.combustivel += c.combustivel; p.adm += c.adm; p.imposto += c.imposto;
    p.pneus += c.pneus; p.alim += c.alimMotorista + c.alimAjudante; p.pag += c.pagMotorista + c.pagAjudante;
    p.outros += c.outros; p.km += c.km; p.qtdViagens += 1; p.receita += c.valorViagem;
  });
  (state.manutencoes || []).forEach((m) => {
    if (!graficosPeriodoBate(m.data, periodo)) return;
    if (!m.placa) return;
    if (!porPlaca[m.placa]) porPlaca[m.placa] = zero();
    const p = porPlaca[m.placa];
    p.qtdManut += 1;
    if (m.jaEmDividaFixa === true) return; // já contado nas dívidas fixas, não soma de novo
    const ehInv = m.investimento === true || m.categoria === "Estrutural";
    if (!ehInv) p.manutencaoReal += mtSomaPecasReal(m) + (Number(m.maoObra) || 0);
  });
  (state.abastecimentos || []).forEach((a) => {
    if (a.status !== "aprovado") return;
    if (!graficosPeriodoBate(a.data, periodo)) return;
    if (!a.placa) return;
    if (!porPlaca[a.placa]) porPlaca[a.placa] = zero();
    porPlaca[a.placa].litrosAbast += Number(a.litros) || 0;
    porPlaca[a.placa].valorAbast += Number(a.valor) || 0;
  });
  Object.keys(porPlaca).forEach((placa) => {
    const p = porPlaca[placa];
    p.custoTotal = p.custoViagens + p.manutencaoReal;
    p.consumoKmL = p.litrosAbast > 0 ? (p.km / p.litrosAbast) : 0;
  });
  return porPlaca;
}
// Evolução mensal do custo total da frota (custo de viagens + manutenção real), mês a mês.
function graficosEvolucaoMensal() {
  const meses = mesesDisponiveis();
  return meses.map((mes) => {
    let custoViagens = 0, manutencaoReal = 0, receita = 0;
    (state.viagens || []).forEach((v) => {
      if (!v.data || v.data.slice(0, 7) !== mes) return;
      const c = calcularViagem(v);
      custoViagens += c.totalDesp; receita += c.valorViagem;
    });
    (state.manutencoes || []).forEach((m) => {
      if (!m.data || m.data.slice(0, 7) !== mes) return;
      if (m.jaEmDividaFixa === true) return;
      const ehInv = m.investimento === true || m.categoria === "Estrutural";
      if (!ehInv) manutencaoReal += mtSomaPecasReal(m) + (Number(m.maoObra) || 0);
    });
    return { mes, custoTotal: custoViagens + manutencaoReal, custoViagens, manutencaoReal, receita };
  });
}

/* ===================== ALMOXARIFADO (v36) =====================
   Controle de estoque de peças. Entrada (compra) e saída (manual ou via
   manutenção). Saldo é SEMPRE derivado (entradas − saídas manuais −
   consumo em manutenções), então editar não duplica baixa.
   Cada item: { id, nome, qtdMin, custoUnit, entradas:[], saidas:[] }
   entradas: { id, qtd, custoUnit, data, obs }
   saidas (manuais): { id, qtd, data, obs }
   A despesa só conta no Financeiro QUANDO a peça é usada numa manutenção
   (item com origem "almox"), amarrada à placa do veículo. */
function almoxItemPorId(id) {
  return (state.almoxarifado || []).find((x) => x.id === id) || null;
}
// Quanto desse item já foi consumido em manutenções (qualquer mês)
function almoxConsumoManut(itemId) {
  let q = 0;
  (state.manutencoes || []).forEach((m) => {
    (m.itens || []).forEach((it) => {
      if (it.origem === "almox" && it.almoxId === itemId) q += Number(it.qtd) || 0;
    });
  });
  return q;
}
function almoxEntradasTotal(item) {
  return (item.entradas || []).reduce((s, e) => s + (Number(e.qtd) || 0), 0);
}
function almoxSaidasManuaisTotal(item) {
  return (item.saidas || []).reduce((s, e) => s + (Number(e.qtd) || 0), 0);
}
function almoxSaldo(item) {
  if (!item) return 0;
  return almoxEntradasTotal(item) - almoxSaidasManuaisTotal(item) - almoxConsumoManut(item.id);
}
function almoxBaixo(item) {
  return almoxSaldo(item) <= (Number(item.qtdMin) || 0);
}
function adicionarItemAlmox() {
  if (!state.almoxarifado) state.almoxarifado = [];
  state.almoxarifado.unshift({ id: uid(), nome: "", qtdMin: 0, custoUnit: 0, entradas: [], saidas: [] });
  salvar(); render();
}
function atualizarItemAlmox(id, campo, valor) {
  const it = almoxItemPorId(id);
  if (!it) return;
  if (campo === "qtdMin" || campo === "custoUnit") valor = Number(String(valor).replace(",", ".")) || 0;
  it[campo] = valor;
  salvar(); render();
}
function removerItemAlmox(id) {
  const it = almoxItemPorId(id);
  if (!it) return;
  const cons = almoxConsumoManut(id);
  if (cons > 0 && !confirm("Este item já foi usado em manutenção(ões). Excluir mesmo assim? (o histórico de manutenção mantém o custo já lançado)")) return;
  if (cons === 0 && !confirm("Excluir este item do almoxarifado?")) return;
  state.almoxarifado = (state.almoxarifado || []).filter((x) => x.id !== id);
  salvar(); render();
}
// Entrada = compra que abastece o estoque (atualiza também o custo unitário)
function entradaAlmox(id) {
  const it = almoxItemPorId(id);

  const cStr = prompt("Custo unitário (R$) desta compra?\n(deixe em branco p/ manter " + fmtR(Number(it.custoUnit) || 0) + ")", "");
  let custo = Number(it.custoUnit) || 0;

  const dStr = prompt("DATA da compra?\nFormato DD/MM/AAAA (ex: 15/02/2026) — deixe em branco p/ hoje.", "");
  const data = normalizarData(dStr, hojeISO());

  const obs = prompt("Observação (nota fiscal, fornecedor...) — opcional", "") || "";

}
// Saída manual = baixa avulsa que não passou por uma manutenção
function saidaAlmox(id) {

// Corrige a data de uma entrada/saída já lançada (ex: peça comprada em fevereiro, lançada hoje)
function editarDataMovAlmox(id, tipo, movId) {

function exportarAlmoxExcel() {

function calcularTotais() {
  const vs = veiculosComMes();
  const totalVeiculos = vs.length;
  const emViagem = vs.filter((v) => v.statusOp === "Em viagem").length;
  const foraOperacao = vs.filter((v) => v.statusOp === "Fora de operação").length;
  const bauComprado = vs.filter((v) => v.bau === "Baú comprado").length;
  const bauNegociacao = vs.filter((v) => v.bau === "Baú em negociação").length;
  const viagensMes = vs.reduce((s, v) => s + (Number(v.viagensMes) || 0), 0);
  const kmMes = vs.reduce((s, v) => s + (Number(v.kmMes) || 0), 0);
  const custoMes = vs.reduce((s, v) => s + (Number(v.custoMes) || 0), 0);
  const receitaMes = vs.reduce((s, v) => s + (Number(v.receitaMes) || 0), 0);
  const margem = receitaMes - custoMes;
  const margemPct = receitaMes > 0 ? (margem / receitaMes) * 100 : 0;
  const seguroVencendo = vs.filter((v) => { const d = diasPara(v.venctoSeguro); return d !== null && d <= 30; }).length;
  const totalDividasFixas = state.dividas.reduce((s, d) => s + (Number(d.valorMes) || 0), 0);
  // viagens do MÊS ATIVO (velocímetro do mês) — v39
  const viagensMesAtivo = state.viagens.filter((v) => v.data && v.data.slice(0, 7) === state.mesAtivo);
  const viagensReceita = viagensMesAtivo.reduce((s, v) => s + (Number(v.valorViagem) || 0), 0);
  const viagensDespesa = viagensMesAtivo.reduce((s, v) => s + calcularViagem(v).totalDesp, 0);
  const viagensSobra = viagensReceita - viagensDespesa;
  // viagens ACUMULADAS (todos os meses → histórico) — v39
  const viagensReceitaAcum = state.viagens.reduce((s, v) => s + (Number(v.valorViagem) || 0), 0);
  const viagensDespesaAcum = state.viagens.reduce((s, v) => s + calcularViagem(v).totalDesp, 0);
  const viagensSobraAcum = viagensReceitaAcum - viagensDespesaAcum;
  const margemViagensAcumPct = viagensReceitaAcum > 0 ? (viagensSobraAcum / viagensReceitaAcum) * 100 : 0;
  const mt = calcularManutencao();
  const manutencaoReal = mt.real;
  const investimento = mt.investimento;
  const liquidoTotal = margem + viagensSobra;                    // manual + viagens
  const lucroReal = liquidoTotal - totalDividasFixas - manutencaoReal;
  const ocupacaoPct = totalVeiculos > 0 ? (emViagem / totalVeiculos) * 100 : 0;
  return { totalVeiculos, emViagem, foraOperacao, bauComprado, bauNegociacao, viagensMes, kmMes, custoMes, receitaMes, margem, margemPct, seguroVencendo, totalDividasFixas, viagensReceita, viagensDespesa, viagensSobra, viagensReceitaAcum, viagensDespesaAcum, viagensSobraAcum, margemViagensAcumPct, manutencaoReal, investimento, liquidoTotal, lucroReal, ocupacaoPct };
}

function resumoViagensPorPlaca(mes) {
  const resumo = {};
  state.viagens
    .slice()
    .sort((a, b) => (a.data || "").localeCompare(b.data || "")) // ordem cronológica p/ "cliente mais recente" ficar por último
    .forEach((v) => {
      if (mes && (!v.data || v.data.slice(0, 7) !== mes)) return;
      const c = calcularViagem(v);
      if (!resumo[v.placa]) resumo[v.placa] = { receita: 0, despesa: 0, sobra: 0, qtd: 0, clientes: [] };
      resumo[v.placa].receita += c.valorViagem;
      resumo[v.placa].despesa += c.totalDesp;
      resumo[v.placa].sobra += c.sobra;
      resumo[v.placa].qtd += 1;
      if (v.cliente && resumo[v.placa].clientes.indexOf(v.cliente) === -1) resumo[v.placa].clientes.push(v.cliente);
    });
  return resumo;
}

/* ===================== FECHAMENTO MENSAL / CAIXA (v31) ===================== */
// Lista de meses "YYYY-MM" com atividade (viagens, manutenções, fechamentos) + mês atual + mês ativo.
function mesesDisponiveis() {
  const set = {};
  (state.viagens || []).forEach((v) => { if (v.data) set[v.data.slice(0, 7)] = 1; });
  (state.manutencoes || []).forEach((m) => { if (m.data) set[m.data.slice(0, 7)] = 1; });
  Object.keys(state.fechamentos || {}).forEach((k) => { set[k] = 1; });
  Object.keys(state.frotaMes || {}).forEach((k) => { set[k] = 1; });
  set[new Date().toISOString().slice(0, 7)] = 1;
  if (state.mesAtivo) set[state.mesAtivo] = 1;
  return Object.keys(set).sort();
}

// "2026-06" -> "Junho/2026"
function mesLabel(mes) {
  const nomes = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const p = String(mes).split("-");
  const i = (parseInt(p[1], 10) || 1) - 1;
  return (nomes[i] || "?") + "/" + (p[0] || "");
}

// ===== Dívidas com prazo: cálculo de parcela por mês (v42) =====
// "2026-06" -> número de meses absoluto (p/ subtrair meses entre datas)
function mesParaIndice(mes) {
  const p = String(mes || "").split("-");
  const ano = parseInt(p[0], 10);
  const m = parseInt(p[1], 10);
  if (!Number.isFinite(ano) || !Number.isFinite(m)) return null;
  return ano * 12 + (m - 1);
}
// Status de uma dívida em um mês: { ativa, comPrazo, parcela, total }
function dividaStatusNoMes(d, mes) {
  // v79: parcelasTotal e mesInicio agora respeitam a vigência de cada mês (não vazam edição
  // feita hoje pra meses já fechados).
  const totalRaw = campoDividaNoMes(d, "parcelasTotal", mes);
  const ini = campoDividaNoMes(d, "mesInicio", mes);
  const total = parseInt(totalRaw, 10);
  if (!Number.isFinite(total) || total <= 0) {
    // dívida sem prazo (fixa/perpétua) — ativa a partir do mês de início, se houver definido
    if (ini) {
      const ia = mesParaIndice(mes), ib = mesParaIndice(ini);
      if (ia != null && ib != null) return { ativa: ia >= ib, comPrazo: false, parcela: 0, total: 0 };
    }
    return { ativa: true, comPrazo: false, parcela: 0, total: 0 }; // sem início definido — comportamento antigo
  }
  const ia = mesParaIndice(mes), ib = mesParaIndice(ini);
  if (ia == null || ib == null) return { ativa: true, comPrazo: false, parcela: 0, total: 0 };
  const parcela = ia - ib + 1;            // 1ª parcela no mesInicio
  return { ativa: parcela >= 1 && parcela <= total, comPrazo: true, parcela, total };
}
// Lista detalhada das dívidas ATIVAS no mês + soma
function dividasDoMes(mes) {
  const itens = [];
  let total = 0;
  (state.dividas || []).forEach((d) => {
    const st = dividaStatusNoMes(d, mes);
    if (!st.ativa) return;
    const valor = valorDividaNoMes(d, mes);
    total += valor;
    itens.push({ descricao: campoDividaNoMes(d, "descricao", mes), valor, comPrazo: st.comPrazo, parcela: st.parcela, totalParc: st.total, obs: campoDividaNoMes(d, "obs", mes) });
  });
  return { itens, total };
}

// Lista de boletos vencendo (dentro da antecedência) ou vencidos, com base na data REAL de hoje.
// Para cada dívida ativa com dia de vencimento, pega a ocorrência relevante (mês atual ou,

function boletosAlerta() {

    let chave = chaveMes(ano, mes0);
    let dia = parseInt(campoDividaNoMes(d, "diaVencimento", chave), 10);
    if (!Number.isFinite(dia) || dia < 1) return;          // sem dia de vencimento → não alerta
    // ocorrência deste mês
    let diaClamp = Math.min(dia, diasNoMes(ano, mes0));
    let venc = new Date(ano, mes0, diaClamp); venc.setHours(0, 0, 0, 0);
    let pago = boletoEstaPago(d.id, chave);
    // se a deste mês já passou E está paga → olha a do mês que vem
    if (venc < hoje && pago) {
      mes0 += 1; if (mes0 > 11) { mes0 = 0; ano += 1; }
      chave = chaveMes(ano, mes0);
      dia = parseInt(campoDividaNoMes(d, "diaVencimento", chave), 10);
      if (!Number.isFinite(dia) || dia < 1) return;
      diaClamp = Math.min(dia, diasNoMes(ano, mes0));
      venc = new Date(ano, mes0, diaClamp); venc.setHours(0, 0, 0, 0);
      pago = boletoEstaPago(d.id, chave);
    }
    if (pago) return;
    // só alerta se a dívida está ATIVA no mês da ocorrência (parcelada encerrada não alerta)
    const st = dividaStatusNoMes(d, chave);
    if (!st.ativa) return;
    const descricao = campoDividaNoMes(d, "descricao", chave);
    const valor = valorDividaNoMes(d, chave);
    const diff = Math.round((venc - hoje) / 86400000); // dias até o vencimento (negativo = vencido)
    if (diff < 0) itens.push({ id: d.id, descricao, valor, dia, venc, chave, status: "vencido", dias: -diff });
    else if (diff <= aviso) itens.push({ id: d.id, descricao, valor, dia, venc, chave, status: "vencendo", dias: diff });
  });
  itens.sort((a, b) => a.venc - b.venc);
  const totalVencido = itens.filter((i) => i.status === "vencido").reduce((s, i) => s + i.valor, 0);
  const totalVencendo = itens.filter((i) => i.status === "vencendo").reduce((s, i) => s + i.valor, 0);
  return { itens, totalVencido, totalVencendo };
}
function setAvisoBoletoDias(valor) {

// ===== Troca de óleo: KM regressivo por veículo (v49) =====
// Retorna null se não configurado. proximo = km da última troca + intervalo; falta = proximo - km atual.
function oleoStatusV(v) {

  const ult = Number(ultRaw) || 0;
  const km = Number(v.kmAtual) || 0;
  const proximo = ult + intv;
  return { proximo, falta: proximo - km, km, intervalo: intv, ultima: ult };
}

// ===== Lançamentos de troca de óleo (v50): tipo, filtros e valores por veículo/mês =====
function adicionarTrocaOleo() {

  state.oleoTrocas.unshift({
    id: uid(), placa: placas[0] || "", data: hoje, km: "", tipoOleo: "",
    litros: "", precoLitro: (ultPreco != null ? ultPreco : ""), valorOleo: 0,
    filtros: [{ id: uid(), nome: "", modelo: "", valor: 0 }], obs: "",

}
function atualizarTrocaOleo(id, campo, valor) {
  const t = (state.oleoTrocas || []).find((x) => String(x.id) === String(id));
  if (!t) return;
  const placaAntes = t.placa;
  t[campo] = valor;
  if (campo === "litros" || campo === "precoLitro") recalcValorOleo(t);
  if (campo === "km" || campo === "placa" || campo === "data") {
    if (placaAntes) sincronizarOleoUltima(placaAntes);

}
// Valor do óleo = litros × preço/litro (só recalcula quando os dois estão preenchidos; senão fica manual)
function recalcValorOleo(t) {
  const temL = t.litros !== "" && t.litros != null;
  const temP = t.precoLitro !== "" && t.precoLitro != null;
  if (!temL || !temP) return;
  const L = Number(t.litros), P = Number(t.precoLitro);
  if (isNaN(L) || isNaN(P)) return;
  t.valorOleo = Math.round(L * P * 100) / 100;
}
function removerTrocaOleo(id) {
  const t = (state.oleoTrocas || []).find((x) => String(x.id) === String(id));
  const placa = t ? t.placa : null;
  state.oleoTrocas = (state.oleoTrocas || []).filter((x) => String(x.id) !== String(id));

}
// ---- Filtros (lista dentro de cada troca) ----
function adicionarFiltroTroca(trocaId) {

}
function atualizarFiltroTroca(trocaId, filtroId, campo, valor) {

function removerFiltroTroca(trocaId, filtroId) {

function somaFiltros(t) {

}

// Migração v51: filtros de string única -> lista de itens {nome, modelo, valor}
function migrarTrocasOleoFiltros() {
  if (!Array.isArray(state.oleoTrocas)) { state.oleoTrocas = []; return; }
  let mudou = false;
  state.oleoTrocas.forEach((t) => {
    if (!Array.isArray(t.filtros)) {
      const arr = [];
      const nomeAntigo = (typeof t.filtros === "string" && t.filtros.trim()) ? t.filtros.trim() : "";
      const valorAntigo = Number(t.valorFiltros) || 0;
      if (nomeAntigo || valorAntigo) arr.push({ id: uid(), nome: nomeAntigo || "Filtros", modelo: "", valor: valorAntigo });
      t.filtros = arr;
      delete t.valorFiltros;
      mudou = true;
    }
    (t.filtros || []).forEach((f) => { if (f.id == null) { f.id = uid(); mudou = true; } });

// A última troca de cada veículo (maior km entre as trocas lançadas) alimenta o KM regressivo.
function sincronizarOleoUltima(placa) {
  const v = state.veiculos.find((x) => x.placa === placa);
  if (!v) return;
  const doVeic = (state.oleoTrocas || []).filter((t) => t.placa === placa && t.km !== "" && t.km != null);
  if (!doVeic.length) return;
  const maxKm = doVeic.reduce((mx, t) => Math.max(mx, Number(t.km) || 0), 0);
  v.oleoKmUltima = maxKm;
}
// Gasto de óleo+filtros no mês, agrupado por placa.
function gastoOleoMes(mes) {
  const porPlaca = {}; let totalGeral = 0;

    if (!t.data || t.data.slice(0, 7) !== mes) return;
    const p = t.placa || "—";

    const o = Number(t.valorOleo) || 0, f = somaFiltros(t);

function exportarOleoExcel() {

  const linhas = (state.oleoTrocas || []).slice().sort((a, b) => String(b.data).localeCompare(String(a.data))).map((t) => {
    const detalhe = (t.filtros || []).map((f) => `${f.nome || "filtro"}${f.modelo ? " (" + f.modelo + ")" : ""}: ${Number(f.valor) || 0}`).join(" | ");
    return [t.data || "", t.placa || "", t.km || "", t.tipoOleo || "", (t.litros != null ? t.litros : ""), (t.precoLitro != null ? t.precoLitro : ""), detalhe, Number(t.valorOleo) || 0, somaFiltros(t), totalTroca(t), t.obs || ""];
  });

// Alertas de veículo p/ o topo: emplacamento vencendo (≤30d) e óleo faltando ≤ aviso (ou vencido).
function alertasVeiculos() {
  garantirConfig();
  const avisoOleo = Number(state.config.avisoOleoKm) || 1000;
  const empl = [], oleo = [];
  (state.veiculos || []).forEach((v) => {
    if (!v.placa) return;
    const dE = diasPara(v.emplacamento);
    if (dE !== null && dE <= 30) empl.push({ id: v.id, placa: v.placa, modelo: v.modelo || "", dias: dE, data: v.emplacamento });

// ---- Login / logout via Supabase Auth ----
function fazerLogin(email, senha) {
  const el = document.getElementById("loginErro");
  const btn = document.getElementById("loginBtn");
  if (el) el.style.display = "none";
  email = String(email || "").trim();
  senha = String(senha || "");
  if (!email || !senha) {
    if (el) { el.textContent = "Preencha e-mail e senha."; el.style.display = "block"; }
    return;
  }
  if (btn) { btn.disabled = true; btn.textContent = "Entrando..."; }
  rfGetClient().then(function (sb) {
    if (!sb) { if (el) { el.textContent = "Sem conexão com o servidor. Tente novamente."; el.style.display = "block"; } if (btn) { btn.disabled = false; btn.textContent = "Entrar"; } return; }
    sb.auth.signInWithPassword({ email: email, password: senha }).then(function (res) {
      if (res.error) {
        if (el) { el.textContent = "E-mail ou senha incorretos."; el.style.display = "block"; }
        if (btn) { btn.disabled = false; btn.textContent = "Entrar"; }
        return;
      }
      carregarPerfilEEntrar(sb, res.data.user);
    }).catch(function () {
      if (el) { el.textContent = "Falha ao conectar. Tente novamente."; el.style.display = "block"; }
      if (btn) { btn.disabled = false; btn.textContent = "Entrar"; }
    });
  });
}
function carregarPerfilEEntrar(sb, user) {

      if (el) { el.textContent = "Sua conta ainda não tem perfil liberado. Fale com o administrador."; el.style.display = "block"; }

      const btn = document.getElementById("loginBtn");

    state.sessao = {

    // só a própria lista de viagens via RPC isolada (cliente_minhas_viagens).
    if (state.sessao.papel !== "motorista" && state.sessao.papel !== "cliente" && typeof window.rfIniciarSyncEquipe === "function") {
      window.rfIniciarSyncEquipe();

    if (state.sessao.papel === "motorista" && typeof rfAbastCarregar === "function") { rfAbastCarregar(); }
    if (state.sessao.papel === "motorista" && typeof rfAbastAssinarTempoReal === "function") { rfAbastAssinarTempoReal(); }
    if (state.sessao.papel === "motorista" && typeof rfViagemFimCarregar === "function") { rfViagemFimCarregar(); }
    if (state.sessao.papel === "motorista" && typeof rfViagemFimAssinarTempoReal === "function") { rfViagemFimAssinarTempoReal(); }
    if (state.sessao.papel === "motorista" && typeof motoristaResumoAtualizar === "function") { motoristaResumoAtualizar(); }

// v95: a sessao fica guardada em localStorage (rf-frota-sessao-v1) para abrir o
// app rapido sem esperar rede. O problema: se o admin mudar o papel de alguem
// (ex: de "user" para "motorista") DEPOIS que a pessoa ja tinha uma sessao salva
// naquele aparelho, o aparelho continua mostrando o papel antigo indefinidamente
// -- so corrige se a pessoa clicar em Sair e entrar de novo. Isso e o que causava

function revalidarSessaoAoAbrir() {

    if (!sb) return;

      if (res.error || !res.data) { logout(); return; }
      const p = res.data;

      const papelMudou = state.sessao.papel !== (p.papel || "user");
      state.sessao.nome = p.nome || "";
      state.sessao.papel = p.papel || "user";
      state.sessao.modulos = Array.isArray(p.modulos) ? p.modulos : [];

// Valores recorrentes de UM mês específico (receita/custo manual da frota nesse mês + dívidas fixas atuais)
function valoresRecorrentesDoMes(mes) {
  let receitaManual = 0, custoManual = 0;
  const recMes = (state.frotaMes && state.frotaMes[mes]) || null; // v47: override por mês
  state.veiculos.forEach((v) => {
    const r = recMes && recMes[v.id];
    receitaManual += (r && r.receitaMes != null) ? (Number(r.receitaMes) || 0) : (Number(v.receitaMes) || 0); // override do mês, senão recorrente
    custoManual   += (r && r.custoMes   != null) ? (Number(r.custoMes)   || 0) : (Number(v.custoMes)   || 0);
  });
  const dm = dividasDoMes(mes);                    // só as dívidas ATIVAS no mês (parceladas que ainda correm)
  return { receitaManual, custoManual, dividasFixas: dm.total, dividasDetalhe: dm.itens };
}
// Valores recorrentes do mês ATIVO (usado na tela do Financeiro)
function valoresRecorrentesVivos() {

}

/* ===== SALDO POR CAMINHÃO (v80) =====================================
   Igual ao Fechamento Mensal da empresa (calcularCaixaMeses), só que
   por VEÍCULO: encadeia mês a mês receita (viagens + manual do veículo)
   − despesa (viagens + custo manual do veículo) − dívida alocada àquele
   veículo naquele mês (campo "divida", já existia por veículo/mês).
   Resultado: saldo acumulado do caminhão, mês a mês. */
// v82: edita a "Dívida" de um MÊS ESPECÍFICO (não precisa estar com aquele mês
// ativo) — usado direto na tabela do Saldo por Caminhão, pra não precisar caçar
// o campo lá na aba Financeiro.
function atualizarDividaCaminhaoMes(veiculoId, mes, valor) {
  if (!state.frotaMes) state.frotaMes = {};
  if (!state.frotaMes[mes]) state.frotaMes[mes] = {};
  if (!state.frotaMes[mes][veiculoId]) state.frotaMes[mes][veiculoId] = blankMesRec();
  state.frotaMes[mes][veiculoId].divida = Number(String(valor).replace(",", ".")) || 0;
  salvar(); render();
}
function calcularSaldoCaminhao(veiculoId) {
  const v = state.veiculos.find((x) => String(x.id) === String(veiculoId));
  if (!v) return { meses: [], veiculo: null };
  const ms = mesesDisponiveis();
  const out = [];
  let saldoAcum = 0;
  ms.forEach((mes) => {
    const resumo = resumoViagensPorPlaca(mes)[v.placa] || { receita: 0, despesa: 0, sobra: 0, qtd: 0 };
    const recMes = (state.frotaMes && state.frotaMes[mes] && state.frotaMes[mes][v.id]) || {};
    // usouRecReceita/usouRecCusto: true só quando este mês NÃO tem valor próprio salvo e
    // por isso caiu no recorrente "de fábrica" — usado pra só avisar quando isso pesa de verdade.
    const usouRecReceita = recMes.receitaMes == null;
    const usouRecCusto = recMes.custoMes == null;
    const receitaManual = usouRecReceita ? (Number(v.receitaMes) || 0) : (Number(recMes.receitaMes) || 0);
    const custoManual = usouRecCusto ? (Number(v.custoMes) || 0) : (Number(recMes.custoMes) || 0);
    // "divida" é campo POR MÊS (igual status/km) — sem registro naquele mês vale 0,
    // NUNCA herda o valor "mestre" do cadastro do veículo (esse era o bug).
    const dividaAlocada = Number(recMes.divida) || 0;
    const receitaTotal = resumo.receita + receitaManual;
    const despesaTotal = resumo.despesa + custoManual;
    const resultadoMes = receitaTotal - despesaTotal - dividaAlocada;
    const saldoInicial = saldoAcum;
    const saldoFinal = saldoInicial + resultadoMes;
    out.push({ mes, receitaTotal, despesaTotal, dividaAlocada, resultadoMes, saldoInicial, saldoFinal, qtdViagens: resumo.qtd, usouRecReceita: usouRecReceita && receitaManual !== 0, usouRecCusto: usouRecCusto && custoManual !== 0 });
    saldoAcum = saldoFinal;
  });
  return { meses: out, veiculo: v };
}
function exportarSaldoCaminhaoExcel() {

// Registro de override por mês (pode estar vazio = usa valores vivos)
function fechamentoDe(mes) {
  return (state.fechamentos && state.fechamentos[mes]) || {};
}

// Calcula TODOS os meses em ordem, encadeando DOIS acumuladores independentes:
//   LUCRO acumulado  = lucro anterior + lucro operacional do mês
//   DÍVIDA acumulada = dívida anterior + movimento de dívida do mês (+aumenta / −paga)
// Cada mês entra em branco para lançamento; só os dois acumuladores vêm do mês anterior.
function calcularCaixaMeses() {
  const meses = mesesDisponiveis();
  const out = {};
  let saldoAcum = 0;                  // saldo único que rola: + = lucro acumulado, − = dívida acumulada
  let saldoOrigemMes = null;          // de qual mês veio o saldo que entrou
  meses.forEach((mes, idx) => {
    const f = fechamentoDe(mes);
    const vivos = valoresRecorrentesDoMes(mes);

    // Receita/custo manual do mês (default = recorrente da frota, ex: aluguel Leão; editável por mês)
    const receitaManual = f.receitaManualOverride != null ? Number(f.receitaManualOverride) : vivos.receitaManual;
    const custoManual   = f.custoManualOverride   != null ? Number(f.custoManualOverride)   : vivos.custoManual;

    // Viagens e manutenção do mês (entram automático pela data — zeram quando o mês não tem lançamento)
    let viagensReceita = 0, viagensDespesa = 0, viagensImposto = 0;
    (state.viagens || []).forEach((v) => {
      if (!v.data || v.data.slice(0, 7) !== mes) return;
      const c = calcularViagem(v);
      viagensReceita += c.valorViagem;
      viagensDespesa += c.totalDesp;
      viagensImposto += c.imposto;
    });
    let manutencaoReal = 0;
    (state.manutencoes || []).forEach((m) => {
      if (!m.data || m.data.slice(0, 7) !== mes) return;
      if (m.investimento === true || m.categoria === "Estrutural" || m.jaEmDividaFixa === true) return;
      manutencaoReal += mtSomaPecasReal(m) + (Number(m.maoObra) || 0); // peça do almoxarifado já foi paga na entrada — não conta de novo
    });

    // Despesa de viagem SEM o imposto — o imposto é abatido à parte no Financeiro (visível, auditável)
    const viagensDespesaSemImposto = viagensDespesa - viagensImposto;
    // LÍQUIDO do mês (entradas) = receitas − custos de operação (ANTES de imposto e dívidas fixas)
    const liquidoQueSobe = (receitaManual + viagensReceita) - (custoManual + viagensDespesaSemImposto + manutencaoReal);

    // Dívidas fixas recorrentes do mês (galpão, financiamentos, etc.) — ABATEM o resultado deste mês.
    const dividasFixasMes = vivos.dividasFixas;
    // Ajuste manual do mês: + entrada extra / − saída ou dívida extra (one-off). Em branco = 0.
    const ajusteManual = Number(f.ajusteManual) || 0;

    // RESULTADO do mês = líquido − imposto − dívidas fixas do mês (± ajuste). Sobra = lucro; falta = dívida.
    const resultadoMes = liquidoQueSobe - viagensImposto - dividasFixasMes + ajusteManual;

    // SALDO único que entra (do mês anterior) e que rola. 1º mês: pode semear; default 0 (não inventa dívida passada).
    const ehPrimeiro = idx === 0;
    const saldoInicial = ehPrimeiro
      ? (f.saldoInicialOverride != null ? Number(f.saldoInicialOverride) : 0)
      : saldoAcum;
    const origemSaldo = ehPrimeiro ? null : saldoOrigemMes;

    const saldoFinal = saldoInicial + resultadoMes;

    out[mes] = {
      receitaManual, custoManual, viagensReceita, viagensDespesa, viagensImposto, viagensDespesaSemImposto, liquidoQueSobe, manutencaoReal,
      dividasFixasMes, dividasDetalhe: vivos.dividasDetalhe,
      ajusteManual, resultadoMes,
      saldoInicial, origemSaldo, saldoFinal, ehPrimeiro,
    };
    saldoAcum = saldoFinal;
    saldoOrigemMes = mes;            // o próximo mês saberá que o saldo veio DESTE mês
  });
  return out;
}

// Edição de um campo do mês (receitaManualOverride | custoManualOverride | ajusteManual | saldoInicialOverride)
function ajustarFechamento(mes, campo, valor) {
  if (!state.fechamentos) state.fechamentos = {};
  if (!state.fechamentos[mes]) state.fechamentos[mes] = {};
  const txt = String(valor).trim();
  if (txt === "") { delete state.fechamentos[mes][campo]; }   // vazio = volta ao automático/recorrente
  else { state.fechamentos[mes][campo] = Number(txt.replace(",", ".")) || 0; }
  salvar(); render();
}

function trocarMes(mes) { state.mesAtivo = mes; render(); }

// Data padrão de novos lançamentos: se o mês ativo é o mês corrente usa hoje;
// senão usa o dia 1 do mês ativo (para o lançamento cair no mês que está aberto).
function dataPadraoMes() {
  const hojeMes = new Date().toISOString().slice(0, 7);
  if (state.mesAtivo === hojeMes) return new Date().toISOString().slice(0, 10);
  return state.mesAtivo + "-01";
}

// Navega para o mês anterior/seguinte mesmo que ainda não tenha lançamento (dir = -1 ou +1)
function navegarMes(dir) {
  const p = (state.mesAtivo || new Date().toISOString().slice(0, 7)).split("-");
  let y = parseInt(p[0], 10), m = parseInt(p[1], 10) - 1 + dir;
  while (m < 0) { m += 12; y--; }
  while (m > 11) { m -= 12; y++; }
  state.mesAtivo = y + "-" + String(m + 1).padStart(2, "0");
  render();
}

function veiculosFiltrados() {
  return state.veiculos.filter((v) => {
    const t = state.filtroTipo === "Todos" || v.tipo === state.filtroTipo;
    const b = state.busca === "" || v.placa.toLowerCase().includes(state.busca.toLowerCase()) || v.motorista.toLowerCase().includes(state.busca.toLowerCase());
    return t && b;
  }).map((v) => {
    const rec = mesVLer(v);
    const o = Object.assign({}, v);              // cadastro + recorrentes (receitaMes/custoMes) PERMANECEM
    CAMPOS_MES.forEach((c) => { o[c] = rec[c]; }); // só os campos do mês são sobrepostos
    if (rec.receitaMes != null) o.receitaMes = rec.receitaMes; // v47: override manual por mês
    if (rec.custoMes   != null) o.custoMes   = rec.custoMes;
    return o;
  });
}

function gauge(pct, label, sub, color) {
  const clamped = Math.max(0, Math.min(100, pct));
  const angle = (clamped / 100) * 180;
  const rad = (Math.PI / 180) * (180 - angle);
  const cx = 100, cy = 100, r = 80;
  const x = cx + r * Math.cos(rad);
  const y = cy - r * Math.sin(rad);
  return `
    <div style="text-align:center;">
      <svg width="240" height="144" viewBox="0 0 200 120">
        <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#262626" stroke-width="14" stroke-linecap="round"/>
        <path d="M 20 100 A 80 80 0 0 1 ${x.toFixed(2)} ${y.toFixed(2)}" fill="none" stroke="${color}" stroke-width="14" stroke-linecap="round"/>
        <circle cx="${cx}" cy="${cy}" r="4" fill="#fff"/>
        <line x1="${cx}" y1="${cy}" x2="${(cx + 65 * Math.cos(rad)).toFixed(2)}" y2="${(cy - 65 * Math.sin(rad)).toFixed(2)}" stroke="#fff" stroke-width="2"/>
        <text x="100" y="95" text-anchor="middle" fill="#fff" font-size="22" font-weight="800">${clamped.toFixed(0)}%</text>
      </svg>
      <div style="font-size:12px;color:#bbb;margin-top:-4px;">${label}</div>
      ${sub ? `<div style="font-size:11px;color:#777;">${sub}</div>` : ""}
    </div>`;
}

function normTxt(txt) {
  return String(txt).normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9]+/g, "").toLowerCase();
}
function renderAbasAgrupadas() {
  const visiveis = ABAS_DEF.filter((a) => podeVerAba(a.id));

  visiveis.forEach((a) => {
